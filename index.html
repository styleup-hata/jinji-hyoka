<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>人事評価 自己入力システム</title>
<style>
  :root {
    --ug-black: #1a1a1a;
    --ug-navy: #0d1b2a;
    --ug-yellow: #f5c400;
    --ug-yellow-dark: #d4a900;
    --ug-yellow-light: #fff8d6;
    --ug-white: #ffffff;
    --ug-gray-100: #f5f5f5;
    --ug-gray-200: #e8e8e8;
    --ug-gray-400: #aaaaaa;
    --ug-gray-600: #666666;
    --ug-gray-800: #333333;
    --ug-green: #2e7d32;
    --ug-red: #c0392b;
    --ug-blue: #1565c0;
    --radius: 10px;
    --shadow: 0 2px 16px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--ug-navy);
    color: var(--ug-black);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: var(--ug-black);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--ug-yellow);
  }
  .app-logo {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: var(--ug-yellow);
    line-height: 1.2;
    text-transform: uppercase;
  }
  .app-logo span { display: block; font-size: 15px; }
  .app-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ug-white);
    margin-left: auto;
  }
  .btn-logout {
    background: transparent;
    border: 1px solid var(--ug-gray-600);
    color: var(--ug-gray-400);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== CARD ===== */
  .card {
    background: var(--ug-white);
    border-radius: var(--radius);
    padding: 20px;
    margin: 12px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 15px;
    font-weight: 800;
    color: var(--ug-navy);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--ug-yellow);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 18px; }

  /* ===== LOGIN ===== */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(160deg, var(--ug-navy) 0%, #0a2540 100%);
  }
  #loginScreen.active { display: flex; }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo-badge {
    background: var(--ug-yellow);
    color: var(--ug-black);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    border-radius: 4px;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 8px;
  }
  .login-logo h1 {
    color: var(--ug-white);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .login-logo p { color: var(--ug-gray-400); font-size: 12px; margin-top: 4px; }
  .login-box {
    background: var(--ug-white);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .form-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--ug-gray-600);
    margin-bottom: 6px;
    display: block;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .form-select, .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--ug-gray-200);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    color: var(--ug-black);
    background: var(--ug-gray-100);
    appearance: none;
    -webkit-appearance: none;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-select:focus, .form-input:focus { border-color: var(--ug-yellow); background: var(--ug-white); }
  .pin-display {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .pin-dot {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--ug-gray-200);
    border: 2px solid var(--ug-gray-300);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900;
    color: var(--ug-navy);
    transition: background 0.15s;
  }
  .pin-dot.filled { background: var(--ug-yellow); border-color: var(--ug-yellow-dark); }
  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .pin-key {
    background: var(--ug-gray-100);
    border: 2px solid var(--ug-gray-200);
    border-radius: 10px;
    height: 52px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    color: var(--ug-navy);
    transition: all 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .pin-key:active { background: var(--ug-yellow); border-color: var(--ug-yellow-dark); transform: scale(0.95); }
  .pin-key.del { font-size: 16px; color: var(--ug-red); }
  .pin-key.empty { background: transparent; border-color: transparent; cursor: default; }

  /* ===== BUTTONS ===== */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--ug-yellow); color: var(--ug-black); }
  .btn-primary:hover { background: var(--ug-yellow-dark); }
  .btn-danger { background: var(--ug-red); color: white; }
  .btn-secondary { background: var(--ug-gray-200); color: var(--ug-gray-800); }
  .btn-navy { background: var(--ug-navy); color: white; }
  .btn-green { background: var(--ug-green); color: white; }
  .btn-sm {
    width: auto;
    padding: 8px 16px;
    font-size: 13px;
    border-radius: 8px;
  }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--ug-yellow);
    color: var(--ug-navy);
  }

  /* ===== HOME ===== */
  .home-greeting {
    background: linear-gradient(135deg, var(--ug-black) 0%, #2a2a2a 100%);
    padding: 20px;
    margin: 12px;
    border-radius: var(--radius);
    border-left: 4px solid var(--ug-yellow);
    color: var(--ug-white);
  }
  .home-greeting .name { font-size: 20px; font-weight: 800; }
  .home-greeting .role { font-size: 12px; color: var(--ug-yellow); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
  .home-greeting .store { font-size: 12px; color: var(--ug-gray-400); }
  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 10px;
  }
  .status-draft { background: #fff3cd; color: #856404; }
  .status-submitted { background: #d4edda; color: #155724; }
  .status-not-started { background: var(--ug-gray-200); color: var(--ug-gray-600); }

  .deadline-banner {
    background: var(--ug-yellow-light);
    border: 1px solid var(--ug-yellow);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 0 12px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ug-black);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .deadline-banner.overdue { background: #fdecea; border-color: var(--ug-red); color: var(--ug-red); }

  /* ===== PROGRESS ===== */
  .progress-bar-wrap { background: var(--ug-gray-200); border-radius: 6px; height: 8px; margin: 8px 0 4px; }
  .progress-bar { height: 8px; border-radius: 6px; background: var(--ug-yellow); transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--ug-gray-600); text-align: right; }

  /* ===== CATEGORY SECTION ===== */
  .category-header {
    background: var(--ug-navy);
    color: var(--ug-white);
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .category-score { background: var(--ug-yellow); color: var(--ug-black); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 800; }

  /* ===== ITEM CARD ===== */
  .item-card {
    background: var(--ug-white);
    border: 2px solid var(--ug-gray-200);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .item-card.selected { border-color: var(--ug-yellow); background: var(--ug-yellow-light); }
  .item-name { font-size: 14px; font-weight: 800; color: var(--ug-navy); margin-bottom: 4px; }
  .item-criteria { font-size: 12px; color: var(--ug-gray-600); line-height: 1.5; margin-bottom: 10px; }

  .score-buttons { display: flex; gap: 6px; }
  .score-btn {
    flex: 1;
    height: 42px;
    border: 2px solid var(--ug-gray-200);
    border-radius: 8px;
    background: var(--ug-gray-100);
    font-size: 16px;
    font-weight: 800;
    color: var(--ug-gray-600);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .score-btn:active { transform: scale(0.9); }
  .score-btn.selected-1 { background: #c0392b; border-color: #c0392b; color: white; }
  .score-btn.selected-2 { background: #e67e22; border-color: #e67e22; color: white; }
  .score-btn.selected-3 { background: #2980b9; border-color: #2980b9; color: white; }
  .score-btn.selected-4 { background: #27ae60; border-color: #27ae60; color: white; }
  .score-btn.selected-5 { background: #8e44ad; border-color: #8e44ad; color: white; }

  /* ===== MODAL (criteria popup) ===== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex; align-items: flex-end;
  }
  .modal-overlay.hidden { display: none; }
  .modal-sheet {
    background: var(--ug-white);
    border-radius: 18px 18px 0 0;
    padding: 20px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--ug-gray-200); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 16px; font-weight: 800; color: var(--ug-navy); margin-bottom: 14px; }
  .criteria-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--ug-gray-200);
  }
  .criteria-row:last-child { border-bottom: none; }
  .criteria-score-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900; color: white;
  }
  .badge-1 { background: #c0392b; }
  .badge-2 { background: #e67e22; }
  .badge-3 { background: #2980b9; }
  .badge-4 { background: #27ae60; }
  .badge-5 { background: #8e44ad; }
  .criteria-text { font-size: 13px; color: var(--ug-gray-800); line-height: 1.5; }
  .criteria-label { font-size: 11px; font-weight: 700; color: var(--ug-gray-600); margin-bottom: 2px; }
  .modal-select-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-score-btn {
    flex: 1;
    height: 48px;
    border: 2px solid var(--ug-gray-200);
    border-radius: 10px;
    font-size: 18px; font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--ug-gray-100);
    color: var(--ug-gray-600);
  }
  .modal-score-btn:active { transform: scale(0.92); }
  .modal-score-btn.picked-1 { background: #c0392b; border-color: #c0392b; color: white; }
  .modal-score-btn.picked-2 { background: #e67e22; border-color: #e67e22; color: white; }
  .modal-score-btn.picked-3 { background: #2980b9; border-color: #2980b9; color: white; }
  .modal-score-btn.picked-4 { background: #27ae60; border-color: #27ae60; color: white; }
  .modal-score-btn.picked-5 { background: #8e44ad; border-color: #8e44ad; color: white; }

  /* ===== COMMENT ===== */
  .comment-section { margin-top: 8px; }
  .comment-label { font-size: 12px; font-weight: 700; color: var(--ug-navy); margin-bottom: 6px; }
  .comment-textarea {
    width: 100%;
    border: 2px solid var(--ug-gray-200);
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    color: var(--ug-black);
    outline: none;
    transition: border-color 0.2s;
  }
  .comment-textarea:focus { border-color: var(--ug-yellow); }
  .comment-textarea.large { min-height: 120px; }

  /* ===== ADMIN ===== */
  .admin-tabs {
    display: flex;
    background: var(--ug-gray-100);
    border-radius: 10px;
    padding: 4px;
    margin: 12px;
    gap: 4px;
  }
  .admin-tab {
    flex: 1;
    padding: 9px 4px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    background: transparent;
    color: var(--ug-gray-600);
    transition: all 0.15s;
  }
  .admin-tab.active { background: var(--ug-white); color: var(--ug-navy); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .member-row {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--ug-gray-200);
    gap: 10px;
  }
  .member-row:last-child { border-bottom: none; }
  .member-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--ug-navy);
    color: var(--ug-yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900;
    flex-shrink: 0;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 14px; font-weight: 700; color: var(--ug-navy); }
  .member-meta { font-size: 11px; color: var(--ug-gray-600); }
  .member-score { font-size: 18px; font-weight: 900; color: var(--ug-navy); flex-shrink: 0; }
  .member-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-icon {
    width: 34px; height: 34px;
    border: 1px solid var(--ug-gray-200);
    border-radius: 8px;
    background: var(--ug-white);
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:active { background: var(--ug-gray-100); }

  .form-group { margin-bottom: 14px; }
  .form-row { display: flex; gap: 10px; }
  .form-row > * { flex: 1; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ug-black);
    color: var(--ug-white);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
    border-left: 4px solid var(--ug-yellow);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== NAV ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--ug-black);
    border-top: 2px solid var(--ug-yellow);
    display: flex;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--ug-gray-400);
    padding: 10px 4px 8px;
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.15s;
  }
  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--ug-yellow); }
  .pb-nav { padding-bottom: 72px; }

  /* ===== MISC ===== */
  .section-heading {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ug-gray-400);
    padding: 16px 20px 6px;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ug-gray-400);
    font-size: 14px;
  }
  .divider { height: 1px; background: var(--ug-gray-200); margin: 12px 0; }
  .text-xs { font-size: 11px; }
  .text-sm { font-size: 13px; }
  .text-muted { color: var(--ug-gray-600); }
  .fw-bold { font-weight: 700; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }

  .detail-score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--ug-gray-200);
    font-size: 13px;
  }
  .detail-score-row:last-child { border-bottom: none; }
  .score-chip {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; color: white;
    flex-shrink: 0;
  }

  .rank-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.05em;
  }
  .rank-S { background: #8e44ad; color: white; }
  .rank-A { background: #27ae60; color: white; }
  .rank-B { background: #2980b9; color: white; }
  .rank-C { background: #e67e22; color: white; }
  .rank-D { background: #c0392b; color: white; }
  .rank-unknown { background: var(--ug-gray-200); color: var(--ug-gray-600); }

  /* スクロール修正 */
  .scroll-area { overflow-y: auto; }

  /* 設定フォーム */
  .settings-card { background: white; border-radius: var(--radius); padding: 16px; margin: 8px 12px; box-shadow: var(--shadow); }
  .settings-card h3 { font-size: 14px; font-weight: 800; color: var(--ug-navy); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--ug-yellow); }

  /* 警告バナー */
  .warning-banner {
    background: #fdecea;
    border: 1px solid #e74c3c;
    border-radius: 8px;
    padding: 8px 12px;
    margin: 0 12px 8px;
    font-size: 12px;
    font-weight: 700;
    color: #c0392b;
    display: flex;
    align-items: center;
    gap: 6px;
  }

</style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== CRITERIA MODAL ===== -->
<div class="modal-overlay hidden" id="criteriaModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalItemName"></div>
    <div class="text-sm text-muted" style="margin-bottom:12px;" id="modalItemCriteria"></div>
    <div id="modalCriteriaRows"></div>
    <div class="modal-select-row" id="modalSelectRow"></div>
    <button class="btn btn-secondary mt-12" onclick="closeCriteriaModal()">閉じる</button>
  </div>
</div>

<!-- ===== APP HEADER ===== -->
<div class="app-header" id="appHeader" style="display:none;">
  <div class="app-logo"><span>UP GARAGE</span>人事評価システム</div>
  <div class="app-title" id="headerTitle"></div>
  <button class="btn-logout" id="btnLogout" onclick="logout()">ログアウト</button>
</div>

<!-- ============================================================ -->
<!-- SCREEN: LOGIN -->
<!-- ============================================================ -->
<div class="screen active" id="loginScreen">
  <div class="login-logo">
    <div class="login-logo-badge">UP GARAGE GROUP</div>
    <h1>人事評価システム</h1>
    <p>株式会社スタイルアップ</p>
  </div>
  <div class="login-box">
    <div class="form-group">
      <label class="form-label">ログイン種別</label>
      <select class="form-select" id="loginType" onchange="onLoginTypeChange()">
        <option value="staff">スタッフ</option>
        <option value="admin">管理者</option>
      </select>
    </div>
    <div id="staffLoginArea">
      <div class="form-group">
        <label class="form-label">名前を選んでください</label>
        <select class="form-select" id="staffSelect">
          <option value="">-- 選択してください --</option>
        </select>
      </div>
    </div>
    <div id="adminLoginArea" style="display:none;">
      <div class="form-group">
        <label class="form-label">管理者専用</label>
      </div>

}

}
function updatePinDisplay() {
  for (let i = 0; i < 4; i++) {

function onLoginTypeChange() {

function initStaffSelect() {
  const sel = document.getElementById('staffSelect');
  const members = getMembers();
  sel.innerHTML = '<option value="">-- 選択してください --</option>';
  members.forEach(m => {
    sel.innerHTML += `<option value="${m.id}">${m.name}（${m.store}）</option>`;
  });
}

function doLogin() {
  const type = document.getElementById('loginType').value;
  const settings = getSettings();
  document.getElementById('loginError').style.display = 'none';

  if (type === 'admin') {
    if (currentPin === (settings.adminPin || ADMIN_PIN)) {
      currentUser = { type: 'admin', name: '管理者（秦 慈宏）' };
      afterLogin();
    } else {
      showLoginError();
    }
  } else {
    const memberId = document.getElementById('staffSelect').value;
    if (!memberId) { showToast('名前を選んでください'); currentPin = ''; updatePinDisplay(); return; }
    const members = getMembers();
    const member = members.find(m => m.id === memberId);
    if (!member) { showLoginError(); return; }
    if (currentPin === member.pin) {
      currentUser = { type: 'staff', ...member };
      afterLogin();
    } else {
      showLoginError();
    }
  }
}

function showLoginError() {
  document.getElementById('loginError').style.display = 'block';
  currentPin = '';
  updatePinDisplay();
  setTimeout(() => { document.getElementById('loginError').style.display = 'none'; }, 2000);
}

function afterLogin() {
  document.getElementById('appHeader').style.display = 'flex';
  if (currentUser.type === 'admin') {
    setHeader('管理者ダッシュボード');
    showScreen('adminScreen');
    showAdminOverview();
  } else {
    setHeader('自己評価入力');
    showScreen('staffHomeScreen');
    renderStaffHome();
  }
}

function logout() {
  currentUser = null;
  currentPin = '';
  updatePinDisplay();
  document.getElementById('appHeader').style.display = 'none';
  document.getElementById('staffSelect').value = '';
  document.getElementById('loginType').value = 'staff';
  onLoginTypeChange();
  initStaffSelect();
  showScreen('loginScreen');
}

function renderStaffHome() {
  const user = currentUser;
  document.getElementById('homeRole').textContent = getRoleLabel(user.role);
  document.getElementById('homeName').textContent = user.name;
  document.getElementById('homeStore').textContent = user.store + ' ｜ 評価期間: ' + (getSettings().period || '2025.10〜2026.3');

  const evals = getEvals();
  const ev = evals[user.id] || {};
  let statusHtml = '';
  if (ev.submitted) {
    statusHtml = '<span class="status-badge status-submitted">✅ 提出済み</span>';
    document.getElementById('btnStartEval').textContent = '内容を修正する';
  } else if (ev.scores && Object.keys(ev.scores).length > 0) {
    statusHtml = '<span class="status-badge status-draft">✏️ 入力途中（途中保存）</span>';
    document.getElementById('btnStartEval').textContent = '続きから入力する';
  } else {
    statusHtml = '<span class="status-badge status-not-started">未入力</span>';
    document.getElementById('btnStartEval').textContent = '評価を入力する';
  }
  document.getElementById('homeStatus').innerHTML = statusHtml;

  // 進捗
  const items = getItemsForRole(user.role);
  const allItems = items.categories.flatMap(c => c.items);
  const scores = ev.scores || {};
  const done = allItems.filter(i => scores[i.id] !== undefined).length;
  const total = allItems.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('homeProgress').innerHTML = `
    <div class="flex-between text-sm fw-bold" style="margin-bottom:4px;">
      <span>定性評価</span><span>${done} / ${total} 項目</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="progress-label">${pct}% 完了</div>
  `;

  // deadline
  const settings = getSettings();
  const dlBanner = document.getElementById('deadlineBanner');
  if (settings.deadline) {
    const dl = new Date(settings.deadline);
    const now = new Date();
    const diff = Math.ceil((dl - now) / 86400000);
    if (diff < 0) {
      dlBanner.innerHTML = `<div class="deadline-banner overdue">⚠️ 提出期限を過ぎています（${settings.deadline}）</div>`;
    } else {
      dlBanner.innerHTML = `<div class="deadline-banner">📅 提出期限：${settings.deadline}（あと ${diff} 日）</div>`;
    }
  } else {
    dlBanner.innerHTML = '';
  }
}

function selectModalScore(s) {

function closeCriteriaModal() {
  document.getElementById('criteriaModal').classList.add('hidden');

function setScore(itemId, score) {
  const evals = getEvals();
  if (!evals[currentUser.id]) evals[currentUser.id] = {};
  if (!evals[currentUser.id].scores) evals[currentUser.id].scores = {};
  evals[currentUser.id].scores[itemId] = score;
  saveEvals(evals);

  // UIを更新
  const card = document.getElementById('icard_' + itemId);
  if (card) {
    card.classList.add('selected');
    card.querySelectorAll('.score-btn').forEach((btn, i) => {
      btn.className = 'score-btn' + (i + 1 === score ? ' selected-' + score : '');
    });

  renderStaffHome();
}

function saveEvalDraft() {
  const evals = getEvals();
  if (!evals[currentUser.id]) evals[currentUser.id] = {};
  evals[currentUser.id].q1 = document.getElementById('q1Text')?.value || '';
  evals[currentUser.id].q2 = document.getElementById('q2Text')?.value || '';
  evals[currentUser.id].lastSaved = new Date().toISOString();
  saveEvals(evals);
  showToast('💾 途中保存しました');
}

function submitEval() {
  const evals = getEvals();
  if (!evals[currentUser.id]) evals[currentUser.id] = {};
  const scores = evals[currentUser.id].scores || {};
  const items = getItemsForRole(currentUser.role);
  const allItems = items.categories.flatMap(c => c.items);
  const missing = allItems.filter(i => scores[i.id] === undefined).length;

  evals[currentUser.id].q1 = document.getElementById('q1Text')?.value || '';
  evals[currentUser.id].q2 = document.getElementById('q2Text')?.value || '';

  if (missing > 0) {
    if (!confirm(`まだ ${missing} 項目が未入力です。このまま提出しますか？`)) return;
  }

  evals[currentUser.id].submitted = true;
  evals[currentUser.id].submittedAt = new Date().toISOString();
  saveEvals(evals);
  showToast('✅ 提出しました！');
  showScreen('staffHomeScreen');
  setHeader('自己評価入力');
  renderStaffHome();
}

// CSV DOWNLOAD
// ============================================================
function downloadCSV(memberId) {
  const id = memberId || currentUser?.id;
  if (!id) return;
  const members = getMembers();
  const member = members.find(m => m.id === id);
  if (!member) return;
  const evals = getEvals();
  const ev = evals[id] || {};
  const scores = ev.scores || {};
  const items = getItemsForRole(member.role);

  let rows = [['カテゴリ', '評価項目', '行動基準', '自己評価点']];
  items.categories.forEach(cat => {
    cat.items.forEach(item => {
      rows.push([cat.name, item.name, item.criteria, scores[item.id] ?? '']);
    });
  });
  rows.push(['振り返りQ1', '', '', ev.q1 || '']);
  rows.push(['振り返りQ2', '', '', ev.q2 || '']);

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `自己評価_${member.name}_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 CSVをダウンロードしました');
}

function downloadCSVForMember(id) { downloadCSV(id); }

function showAdminOverview() {
  const members = getMembers();
  const evals = getEvals();
  const settings = getSettings();

  const submitted = members.filter(m => evals[m.id]?.submitted).length;
  const draft = members.filter(m => !evals[m.id]?.submitted && evals[m.id]?.scores && Object.keys(evals[m.id].scores).length > 0).length;
  const notStarted = members.length - submitted - draft;

  // deadline warnings
  let warningHtml = '';
  if (settings.deadline) {
    const dl = new Date(settings.deadline);
    const now = new Date();
    if (now > dl) {
      const unsubmitted = members.filter(m => !evals[m.id]?.submitted);
      if (unsubmitted.length > 0) {
        warningHtml = `<div class="warning-banner">⚠️ 期限超過：未提出 ${unsubmitted.length}名（${unsubmitted.map(m=>m.name).join('、')}）</div>`;
      }
    }
  }

  let storeGroups = {};
  members.forEach(m => {
    if (!storeGroups[m.store]) storeGroups[m.store] = [];
    storeGroups[m.store].push(m);
  });

  let membersHtml = '';
  Object.keys(storeGroups).forEach(store => {
    membersHtml += `<div class="section-heading">${store}</div>`;
    storeGroups[store].forEach(m => {
      const ev = evals[m.id] || {};
      const items = getItemsForRole(m.role);
      const allItems = items.categories.flatMap(c => c.items);
      const scores = ev.scores || {};
      const done = allItems.filter(i => scores[i.id] !== undefined).length;
      const pct = allItems.length > 0 ? Math.round(done / allItems.length * 100) : 0;

      let statusBadge = '';
      if (ev.submitted) statusBadge = '<span class="status-badge status-submitted">✅提出済</span>';
      else if (done > 0) statusBadge = '<span class="status-badge status-draft">✏️途中</span>';
      else statusBadge = '<span class="status-badge status-not-started">未入力</span>';

      membersHtml += `
        <div class="member-row" onclick="showMemberDetail('${m.id}')" style="cursor:pointer;">
          <div class="member-avatar">${m.name[0]}</div>
          <div class="member-info">
            <div class="member-name">${m.name}</div>
            <div class="member-meta">${getRoleLabel(m.role)} ${statusBadge}</div>
            <div class="progress-bar-wrap" style="margin-top:4px;"><div class="progress-bar" style="width:${pct}%"></div></div>
          </div>
          <div style="font-size:11px;color:var(--ug-gray-400);">▶</div>
        </div>
      `;
    });
  });

  document.getElementById('adminOverview').innerHTML = `
    ${warningHtml}
    <div class="card">
      <div class="card-title"><span class="icon">📊</span>提出状況</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div style="flex:1;background:#d4edda;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:900;color:#155724;">${submitted}</div>
          <div style="font-size:11px;color:#155724;font-weight:700;">提出済み</div>
        </div>
        <div style="flex:1;background:#fff3cd;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:900;color:#856404;">${draft}</div>
          <div style="font-size:11px;color:#856404;font-weight:700;">入力途中</div>
        </div>
        <div style="flex:1;background:var(--ug-gray-100);border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:22px;font-weight:900;color:var(--ug-gray-600);">${notStarted}</div>
          <div style="font-size:11px;color:var(--ug-gray-600);font-weight:700;">未入力</div>
        </div>
      </div>
      <button class="btn btn-navy" onclick="downloadAllCSV()">📤 全員分CSVダウンロード</button>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">👥</span>メンバー別状況</div>
      ${membersHtml}
    </div>
  `;
}

function showMemberDetail(memberId) {
  currentDetailMember = memberId;
  const members = getMembers();
  const member = members.find(m => m.id === memberId);
  if (!member) return;
  const evals = getEvals();
  const ev = evals[memberId] || {};
  const scores = ev.scores || {};
  const items = getItemsForRole(member.role);

  const colors = ['','#c0392b','#e67e22','#2980b9','#27ae60','#8e44ad'];

  let html = `
    <div class="home-greeting">
      <div class="role">${getRoleLabel(member.role)}</div>
      <div class="name">${member.name}</div>
      <div class="store">${member.store}</div>
      ${ev.submitted ? '<span class="status-badge status-submitted">✅ 提出済み</span>' : '<span class="status-badge status-not-started">未提出</span>'}
      ${ev.submittedAt ? `<div style="font-size:11px;color:var(--ug-gray-400);margin-top:4px;">提出日時: ${new Date(ev.submittedAt).toLocaleString('ja-JP')}</div>` : ''}
    </div>
  `;

  items.categories.forEach(cat => {
    let catHtml = '';
    cat.items.forEach(item => {
      const s = scores[item.id];
      catHtml += `
        <div class="detail-score-row">
          <span style="flex:1;">${item.name}</span>
          ${s !== undefined
            ? `<div class="score-chip" style="background:${colors[s]}">${s}</div>`
            : `<div class="score-chip" style="background:var(--ug-gray-200);color:var(--ug-gray-600);">-</div>`}
        </div>
      `;
    });
    html += `
      <div class="card">
        <div class="card-title" style="font-size:13px;"><span class="icon">📋</span>${cat.name}（配点${cat.maxScore}点）</div>
        ${catHtml}
      </div>
    `;
  });

  // Q1 Q2
  html += `
    <div class="card">
      <div class="card-title"><span class="icon">💬</span>振り返り・報告</div>
      <div class="comment-label" style="margin-bottom:6px;">Q1. アピールポイント</div>
      <div style="background:var(--ug-gray-100);border-radius:8px;padding:12px;font-size:13px;color:var(--ug-gray-800);min-height:60px;margin-bottom:14px;white-space:pre-wrap;">${ev.q1 || '（未入力）'}</div>
      <div class="comment-label" style="margin-bottom:6px;">Q2. 課題・チャレンジ</div>
      <div style="background:var(--ug-gray-100);border-radius:8px;padding:12px;font-size:13px;color:var(--ug-gray-800);min-height:60px;white-space:pre-wrap;">${ev.q2 || '（未入力）'}</div>
    </div>
  `;

  document.getElementById('detailContent').innerHTML = html;
  showScreen('detailScreen');
  setHeader(member.name + ' の詳細');
}

function downloadAllCSV() {
  const members = getMembers();
  const evals = getEvals();
  let rows = [['氏名', '店舗', '役職', 'カテゴリ', '評価項目', '行動基準', '自己評価点']];
  members.forEach(member => {
    const ev = evals[member.id] || {};
    const scores = ev.scores || {};
    const items = getItemsForRole(member.role);
    items.categories.forEach(cat => {
      cat.items.forEach(item => {
        rows.push([member.name, member.store, getRoleLabel(member.role), cat.name, item.name, item.criteria, scores[item.id] ?? '']);
      });
    });
    rows.push([member.name, member.store, getRoleLabel(member.role), '振り返りQ1', '', '', ev.q1 || '']);
    rows.push([member.name, member.store, getRoleLabel(member.role), '振り返りQ2', '', '', ev.q2 || '']);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `全員自己評価_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 全員分CSVをダウンロードしました');
}

// ============================================================
// ADMIN MEMBERS
// ============================================================
function showAdminMembers() {
  const members = getMembers();
  let html = `<div class="card">
    <div class="card-title"><span class="icon">👥</span>メンバー管理</div>
    <button class="btn btn-primary btn-sm" style="margin-bottom:14px;" onclick="showAddMemberForm()">＋ メンバー追加</button>
    <div id="addMemberFormArea"></div>
  `;
  members.forEach((m, i) => {
    html += `
      <div class="member-row">
        <div class="member-avatar">${m.name[0]}</div>
        <div class="member-info">
          <div class="member-name">${m.name}</div>
          <div class="member-meta">${getRoleLabel(m.role)} ｜ ${m.store}</div>
          <div class="text-xs text-muted">PIN: ${'●'.repeat(m.pin.length)}</div>
        </div>
        <div class="member-actions">
          <button class="btn-icon" onclick="editMember(${i})" title="編集">✏️</button>
          <button class="btn-icon" onclick="deleteMember(${i})" title="削除">🗑️</button>
        </div>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('adminMembers').innerHTML = html;
}

function showAddMemberForm(editIndex) {
  const members = getMembers();
  const m = editIndex !== undefined ? members[editIndex] : null;
  const title = m ? 'メンバー編集' : 'メンバー追加';
  const html = `
    <div style="background:var(--ug-yellow-light);border:1px solid var(--ug-yellow);border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:13px;font-weight:800;color:var(--ug-navy);margin-bottom:10px;">${title}</div>
      <div class="form-group">
        <label class="form-label">氏名</label>
        <input class="form-input" id="mf_name" value="${m?.name || ''}" placeholder="例：山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">役職</label>
        <select class="form-select" id="mf_role">
          <option value="SM" ${m?.role==='SM'?'selected':''}>SM（店長）</option>
          <option value="VSM" ${m?.role==='VSM'?'selected':''}>VSM（副店長）</option>
          <option value="STAFF" ${m?.role==='STAFF'?'selected':''}>一般スタッフ</option>
          <option value="PART" ${m?.role==='PART'?'selected':''}>アルバイト</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">所属店舗</label>
        <select class="form-select" id="mf_store">
          <option value="埼玉入間店" ${m?.store==='埼玉入間店'?'selected':''}>埼玉入間店</option>
          <option value="川越インター店" ${m?.store==='川越インター店'?'selected':''}>川越インター店</option>
          <option value="その他" ${m?.store==='その他'?'selected':''}>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">PINコード（4桁）</label>
        <input class="form-input" id="mf_pin" type="tel" maxlength="4" value="${m?.pin || ''}" placeholder="例：1234">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="saveMember(${editIndex})">保存</button>
        <button class="btn btn-secondary btn-sm" onclick="cancelMemberForm()">キャンセル</button>
      </div>
    </div>
  `;
  document.getElementById('addMemberFormArea').innerHTML = html;
  document.getElementById('mf_name').focus();
}

function editMember(i) {
  showAddMemberForm(i);
  document.getElementById('addMemberFormArea').scrollIntoView({ behavior: 'smooth' });
}

function saveMember(editIndex) {
  const name = document.getElementById('mf_name').value.trim();
  const role = document.getElementById('mf_role').value;
  const store = document.getElementById('mf_store').value;
  const pin = document.getElementById('mf_pin').value.trim();

  if (!name || !pin) { showToast('氏名とPINを入力してください'); return; }
  if (pin.length !== 4 || !/^\d+$/.test(pin)) { showToast('PINは4桁の数字です'); return; }

  const members = getMembers();
  if (editIndex !== undefined) {
    members[editIndex] = { ...members[editIndex], name, role, store, pin };
  } else {
    members.push({ id: 'member_' + Date.now(), name, role, store, pin });
  }
  saveMembers(members);
  showToast('✅ 保存しました');
  showAdminMembers();
}

function cancelMemberForm() {
  document.getElementById('addMemberFormArea').innerHTML = '';
}

function deleteMember(i) {
  if (!confirm('このメンバーを削除しますか？')) return;
  const members = getMembers();
  members.splice(i, 1);
  saveMembers(members);
  showToast('🗑️ 削除しました');
  showAdminMembers();
}

// ADMIN SETTINGS
// ============================================================
function showAdminSettings() {
  const settings = getSettings();
  document.getElementById('adminSettings').innerHTML = `
    <div class="settings-card">
      <h3>📅 提出期限設定</h3>
      <div class="form-group">
        <label class="form-label">締め切り日</label>
        <input class="form-input" type="date" id="st_deadline" value="${settings.deadline || ''}">
      </div>
      <button class="btn btn-primary btn-sm" onclick="saveDeadline()">保存</button>
    </div>
    <div class="settings-card">
      <h3>📋 評価期間</h3>
      <div class="form-group">
        <label class="form-label">表示テキスト</label>
        <input class="form-input" id="st_period" value="${settings.period || '2025.10〜2026.3'}" placeholder="例：2025.10〜2026.3">
      </div>
      <button class="btn btn-primary btn-sm" onclick="savePeriod()">保存</button>
    </div>
    <div class="settings-card">
      <h3>🔑 管理者PIN変更</h3>
      <div class="form-group">
        <label class="form-label">新しいPIN（4桁）</label>
        <input class="form-input" type="tel" maxlength="4" id="st_adminPin" placeholder="例：0000">
      </div>
      <button class="btn btn-danger btn-sm" onclick="saveAdminPin()">PIN変更</button>
    </div>
    <div class="settings-card">
      <h3>⚠️ データ管理</h3>
      <p class="text-sm text-muted" style="margin-bottom:10px;">提出済みデータをリセットします（メンバー情報は保持されます）</p>
      <button class="btn btn-danger btn-sm" onclick="resetAllEvals()">全評価データをリセット</button>
    </div>
  `;
}

function saveDeadline() {
  const s = getSettings();
  s.deadline = document.getElementById('st_deadline').value;
  saveSettings(s);
  showToast('✅ 締め切り日を保存しました');
}
function savePeriod() {
  const s = getSettings();
  s.period = document.getElementById('st_period').value;
  saveSettings(s);
  showToast('✅ 評価期間を保存しました');
}
function saveAdminPin() {
  const pin = document.getElementById('st_adminPin').value.trim();
  if (pin.length !== 4 || !/^\d+$/.test(pin)) { showToast('PINは4桁の数字で入力してください'); return; }
  const s = getSettings();
  s.adminPin = pin;
  saveSettings(s);
  showToast('✅ 管理者PINを変更しました');
}
function resetAllEvals() {
  if (!confirm('本当に全評価データをリセットしますか？この操作は元に戻せません。')) return;
  localStorage.removeItem(KEY_EVALS);
  showToast('🗑️ リセットしました');
  showAdminOverview();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  initStaffSelect();
