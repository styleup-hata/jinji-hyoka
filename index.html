<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>人事評価システム | スタイルアップ</title>
<style>
:root{--c-bg:#f7f6f3;--c-dark:#2c2c2c;--c-gray:#8a8582;--c-gray-light:#e8e5e0;--c-gray-pale:#f0ede8;--c-salmon:#e8967a;--c-salmon-dark:#d4785e;--c-sage:#8fb89a;--c-sage-dark:#6d9e7a;--c-blue:#7aa5c8;--c-yellow-pale:#f0e8c0;--c-white:#fff;--c-text:#2c2c2c;--c-muted:#8a8582;--c-purple:#8e44ad;--c-red:#c0392b;--c-orange:#e67e22;--radius:12px;--shadow:0 2px 12px rgba(44,44,44,.08);--shadow-lg:0 4px 24px rgba(44,44,44,.12);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--c-bg);color:var(--c-text);min-height:100vh;}
.view{display:none;}.view.active{display:block;}
#loginView{min-height:100vh;background:var(--c-dark);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#loginView.active{display:flex;}
.app-header{background:var(--c-dark);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.app-logo-img{height:32px;width:auto;}
.app-header-title{font-size:13px;font-weight:700;color:#fff;flex:1;}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;}
.period-badge{background:var(--c-salmon);color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;margin-right:6px;}
.login-logo-area{text-align:center;margin-bottom:28px;}
.login-logo-area img{height:80px;width:auto;display:block;margin:0 auto 14px;}
.login-logo-area h1{color:#fff;font-size:18px;font-weight:700;margin-bottom:4px;}
.login-logo-area .company{color:var(--c-gray);font-size:12px;}
.login-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);}
.form-label{font-size:11px;font-weight:700;color:var(--c-muted);margin-bottom:6px;display:block;letter-spacing:.08em;text-transform:uppercase;}
.form-select,.form-input{width:100%;padding:12px 14px;border:2px solid var(--c-gray-light);border-radius:10px;font-size:15px;font-family:inherit;color:var(--c-text);background:var(--c-gray-pale);appearance:none;-webkit-appearance:none;margin-bottom:16px;outline:none;transition:border-color .2s;}
.form-select:focus,.form-input:focus{border-color:var(--c-salmon);background:#fff;}
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.pin-dot{width:46px;height:46px;border-radius:12px;background:var(--c-gray-pale);border:2px solid var(--c-gray-light);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--c-dark);transition:all .15s;}
.pin-dot.filled{background:var(--c-salmon);border-color:var(--c-salmon-dark);color:#fff;}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.pin-key{background:var(--c-gray-pale);border:1px solid var(--c-gray-light);border-radius:12px;height:52px;font-size:20px;font-weight:700;cursor:pointer;color:var(--c-dark);transition:all .1s;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.pin-key:active{background:var(--c-salmon);color:#fff;border-color:var(--c-salmon);transform:scale(.93);}
.pin-key.del{font-size:16px;color:var(--c-red);}
.pin-key.empty{background:transparent;border-color:transparent;cursor:default;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.03em;transition:all .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--c-salmon);color:#fff;}.btn-sage{background:var(--c-sage);color:#fff;}.btn-dark{background:var(--c-dark);color:#fff;}.btn-danger{background:var(--c-red);color:#fff;}.btn-secondary{background:var(--c-gray-light);color:var(--c-dark);}.btn-purple{background:var(--c-purple);color:#fff;}
.btn-sm{width:auto;padding:8px 16px;font-size:12px;border-radius:8px;}
.btn-submit-final{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;font-size:17px;padding:16px;box-shadow:0 4px 16px rgba(39,174,96,.4);animation:pulse-green 2s infinite;}
.btn-review{background:linear-gradient(135deg,#2980b9,#3498db);color:#fff;font-size:15px;padding:14px;}
@keyframes pulse-green{0%,100%{box-shadow:0 4px 16px rgba(39,174,96,.4);}50%{box-shadow:0 4px 24px rgba(39,174,96,.7);}}
.card{background:#fff;border-radius:var(--radius);padding:18px;margin:10px 12px;box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:800;color:var(--c-dark);margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--c-gray-light);}
.home-greeting{background:var(--c-dark);padding:20px;margin:10px 12px;border-radius:var(--radius);color:#fff;border-left:4px solid var(--c-salmon);}
.hg-role{font-size:11px;color:var(--c-salmon);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.hg-name{font-size:22px;font-weight:800;margin-bottom:4px;}
.hg-store{font-size:12px;color:var(--c-gray);}
.hg-period{font-size:11px;color:var(--c-muted);margin-top:6px;}
.status-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:10px;}
.s-draft{background:var(--c-yellow-pale);color:#7a6500;}.s-done{background:#d4edda;color:#155724;}.s-meeting{background:#d1ecf1;color:#0c5460;}.s-none{background:var(--c-gray-light);color:var(--c-gray);}
.deadline-banner{background:var(--c-yellow-pale);border:1px solid #d4b800;border-radius:10px;padding:10px 14px;margin:0 12px 8px;font-size:13px;font-weight:600;color:var(--c-dark);}
.deadline-banner.overdue{background:#fdecea;border-color:var(--c-red);color:var(--c-red);}
.progress-bar-wrap{background:var(--c-gray-light);border-radius:6px;height:8px;margin:8px 0 4px;}
.progress-bar{height:8px;border-radius:6px;background:var(--c-salmon);transition:width .3s;}
.progress-label{font-size:11px;color:var(--c-muted);text-align:right;}
.period-selector{background:var(--c-dark);margin:0 12px 10px;border-radius:var(--radius);padding:12px 14px;}
.period-selector-label{font-size:10px;font-weight:800;color:var(--c-gray);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.period-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
.period-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);transition:all .15s;}
.period-tab.active{background:var(--c-salmon);color:#fff;}
.eval-step-card{background:#fff;border-radius:16px;padding:18px 16px;margin:8px 10px;box-shadow:var(--shadow-lg);}
.step-badge{background:var(--c-salmon);color:#fff;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:800;letter-spacing:.05em;display:inline-block;margin-bottom:10px;}
.step-category{font-size:11px;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.step-item-name{font-size:22px;font-weight:800;color:var(--c-dark);margin-bottom:12px;line-height:1.3;}
.step-criteria-box{background:linear-gradient(135deg,#eef6f0,#e8f4eb);border-radius:12px;padding:14px 16px;margin-bottom:16px;border-left:4px solid var(--c-sage-dark);}
.step-criteria-label{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--c-sage-dark);text-transform:uppercase;margin-bottom:6px;}
.step-criteria-text{font-size:16px;font-weight:600;color:#1a3d25;line-height:1.65;}
.select-hint{text-align:center;font-size:11px;color:var(--c-muted);margin-bottom:8px;}
.score-btn-row{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.score-select-btn{width:100%;border:2px solid var(--c-gray-light);border-radius:12px;padding:12px 14px;text-align:left;cursor:pointer;font-family:inherit;background:var(--c-gray-pale);transition:all .15s;display:flex;align-items:flex-start;gap:12px;}
.score-select-btn:active{transform:scale(.98);}
.score-select-btn.selected-1{background:#fdecea;border-color:var(--c-red);}.score-select-btn.selected-2{background:#fef0e6;border-color:var(--c-orange);}.score-select-btn.selected-3{background:#eaf2f8;border-color:var(--c-blue);}.score-select-btn.selected-4{background:#eaf5ee;border-color:var(--c-sage-dark);}.score-select-btn.selected-5{background:#f4ecf7;border-color:var(--c-purple);}
.ssb-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;margin-top:1px;}
.ssb-1{background:var(--c-red);}.ssb-2{background:var(--c-orange);}.ssb-3{background:var(--c-blue);}.ssb-4{background:var(--c-sage-dark);}.ssb-5{background:var(--c-purple);}
.ssb-text{flex:1;}.ssb-label{font-size:11px;font-weight:700;color:var(--c-muted);margin-bottom:3px;}.ssb-desc{font-size:13px;color:var(--c-text);line-height:1.5;font-weight:500;}
.complete-banner{background:linear-gradient(135deg,#1a5276,#2980b9);border-radius:14px;padding:20px;margin:10px 10px;color:#fff;text-align:center;}
.complete-banner-icon{font-size:40px;margin-bottom:8px;}.complete-banner-title{font-size:18px;font-weight:800;margin-bottom:6px;}.complete-banner-sub{font-size:13px;opacity:.85;margin-bottom:16px;line-height:1.5;}
.submit-action-area{display:flex;flex-direction:column;gap:10px;margin:0 10px 10px;}
.step-prev-btn{width:100%;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--c-gray-light);color:var(--c-dark);transition:all .15s;margin-top:6px;}
.step-prev-btn:disabled{opacity:.4;cursor:default;}
.step-progress{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.step-progress-bar-wrap{flex:1;background:var(--c-gray-light);border-radius:4px;height:5px;}
.step-progress-bar{height:5px;border-radius:4px;background:var(--c-salmon);transition:width .4s;}
.step-progress-text{font-size:11px;font-weight:700;color:var(--c-muted);white-space:nowrap;}
.comment-textarea{width:100%;border:2px solid var(--c-gray-light);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;min-height:110px;color:var(--c-text);outline:none;background:var(--c-gray-pale);transition:border-color .2s;}
.comment-textarea:focus{border-color:var(--c-salmon);background:#fff;}
.q-label{font-size:15px;font-weight:700;color:var(--c-dark);margin-bottom:10px;line-height:1.5;}
.admin-tabs{display:flex;background:var(--c-gray-pale);border-radius:12px;padding:4px;margin:10px 12px;gap:4px;}
.admin-tab{flex:1;padding:9px 4px;border:none;border-radius:8px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;background:transparent;color:var(--c-muted);transition:all .15s;}
.admin-tab.active{background:#fff;color:var(--c-dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.member-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--c-gray-light);gap:10px;}
.member-row:last-child{border-bottom:none;}
.member-avatar{width:38px;height:38px;border-radius:50%;background:var(--c-dark);color:var(--c-salmon);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;}
.member-info{flex:1;min-width:0;}.member-name{font-size:14px;font-weight:700;color:var(--c-dark);}.member-meta{font-size:11px;color:var(--c-muted);}
.member-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-icon{width:34px;height:34px;border:1px solid var(--c-gray-light);border-radius:8px;background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.feedback-box{background:linear-gradient(135deg,#f4ecf7,#ede0f7);border-radius:12px;padding:14px;margin-bottom:12px;border-left:4px solid var(--c-purple);}
.feedback-label{font-size:10px;font-weight:800;color:var(--c-purple);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.feedback-text{font-size:14px;color:#4a235a;line-height:1.6;white-space:pre-wrap;}
.feedback-textarea{width:100%;border:2px solid var(--c-gray-light);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;min-height:140px;color:var(--c-text);outline:none;background:var(--c-gray-pale);transition:border-color .2s;}
.feedback-textarea:focus{border-color:var(--c-purple);background:#fff;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--c-dark);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;border-left:4px solid var(--c-salmon);box-shadow:var(--shadow-lg);}
.toast.show{transform:translateX(-50%) translateY(0);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--c-dark);border-top:1px solid rgba(255,255,255,.1);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;background:transparent;border:none;color:var(--c-gray);padding:10px 4px 8px;font-size:10px;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-btn .nav-icon{font-size:20px;}.nav-btn.active{color:var(--c-salmon);}
.pb-nav{padding-bottom:72px;}
.section-heading{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--c-muted);padding:14px 20px 6px;}
.text-sm{font-size:13px;}.text-muted{color:var(--c-muted);}.fw-bold{font-weight:700;}.mt-12{margin-top:12px;}.form-group{margin-bottom:14px;}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,44,44,.5);z-index:500;display:flex;align-items:center;justify-content:center;}
.loading-overlay.hidden{display:none;}
.loading-box{background:#fff;border-radius:16px;padding:24px 32px;text-align:center;font-weight:700;color:var(--c-dark);font-size:14px;}
.loading-spin{width:36px;height:36px;border:3px solid var(--c-gray-light);border-top-color:var(--c-salmon);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.warning-banner{background:#fdecea;border:1px solid var(--c-red);border-radius:10px;padding:8px 12px;margin:0 12px 8px;font-size:12px;font-weight:700;color:var(--c-red);}
.info-banner{background:#d1ecf1;border:1px solid #17a2b8;border-radius:10px;padding:8px 12px;margin:0 12px 8px;font-size:12px;font-weight:700;color:#0c5460;}
.detail-score-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-gray-light);font-size:13px;}
.detail-score-row:last-child{border-bottom:none;}
.score-chip{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;}
.settings-card{background:#fff;border-radius:var(--radius);padding:16px;margin:8px 12px;box-shadow:var(--shadow);}
.settings-card h3{font-size:14px;font-weight:800;color:var(--c-dark);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--c-gray-light);}
.stat-box{flex:1;border-radius:10px;padding:10px;text-align:center;}
.stat-num{font-size:22px;font-weight:900;}.stat-label{font-size:11px;font-weight:700;}
</style>
</head>
<body>
<div class="loading-overlay hidden" id="loadingOverlay"><div class="loading-box"><div class="loading-spin"></div>データ通信中...</div></div>
<div id="syncBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:var(--c-salmon);color:#fff;padding:6px 16px;font-size:12px;font-weight:700;align-items:center;gap:8px;justify-content:center;">
  <div style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;"></div>
  クラウドと同期中...
</div>
<div class="toast" id="toast"></div>

<div class="app-header" id="appHeader" style="display:none;">
  <img src="logo.jpg" class="app-logo-img" alt="スタイルアップ">
  <span class="period-badge" id="headerPeriod"></span>
  <div class="app-header-title" id="headerTitle"></div>
  <button class="btn-logout" onclick="logout()">ログアウト</button>
</div>

<!-- LOGIN -->
<div class="view active" id="loginView">
  <div class="login-logo-area">
    <img src="logo.jpg" alt="スタイルアップ">
    <h1>人事評価システム</h1>
    <div class="company">株式会社スタイルアップ</div>
  </div>
  <div class="login-box">
    <div class="form-group">
      <label class="form-label">ログイン種別</label>
      <select class="form-select" id="loginType" onchange="onLoginTypeChange()">
        <option value="staff">スタッフ</option>
        <option value="admin">管理者</option>
      </select>
    </div>
    <div id="staffLoginArea">
      <div class="form-group">
        <label class="form-label">名前を選んでください</label>
        <select class="form-select" id="staffSelect"><option value="">-- 選択してください --</option></select>
      </div>
    </div>
    <div id="adminLoginArea" style="display:none;">
      <div style="background:var(--c-gray-pale);border-radius:8px;padding:10px;font-size:12px;color:var(--c-muted);margin-bottom:14px;">管理者専用ログインです</div>
    </div>
    <div class="form-group">
      <label class="form-label">PINコード（4桁）</label>
      <div class="pin-display" id="pinDisplay">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
      </div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinInput('1')">1</button><button class="pin-key" onclick="pinInput('2')">2</button><button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button><button class="pin-key" onclick="pinInput('5')">5</button><button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button><button class="pin-key" onclick="pinInput('8')">8</button><button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key empty"></button><button class="pin-key" onclick="pinInput('0')">0</button><button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div id="loginError" style="color:var(--c-red);font-size:13px;font-weight:700;text-align:center;margin-bottom:12px;display:none;">PINが正しくありません</div>
    <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
    <a href="manual.html" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:12px 16px;border:2px solid var(--c-salmon);border-radius:12px;color:var(--c-salmon);font-size:14px;font-weight:700;text-decoration:none;background:rgba(232,150,122,0.05);">📖 使い方マニュアルを見る</a>

  </div>
</div>

<!-- STAFF HOME -->
<div class="view" id="homeView">
  <div class="home-greeting">
    <div class="hg-role" id="homeRole"></div>
    <div class="hg-name" id="homeName"></div>
    <div class="hg-store" id="homeStore"></div>
    <div class="hg-period" id="homePeriod"></div>
    <div id="homeStatus"></div>
  </div>
  <div id="deadlineBanner"></div>
  <div id="feedbackNotice"></div>
  <div class="period-selector" id="periodSelector">
    <div class="period-selector-label">📅 評価期を選択</div>
    <div class="period-tabs" id="periodTabs"></div>
  </div>
  <div class="card" id="homeEvalCard"></div>
  <div class="card" id="homePastCard" style="display:none;"></div>
  <div style="height:20px;"></div>
</div>

<!-- EVAL INPUT -->
<div class="view" id="evalView">
  <div id="evalStepContent" class="pb-nav"></div>
  <div class="bottom-nav">
    <button class="nav-btn" onclick="showView('homeView');renderStaffHome();"><span class="nav-icon">🏠</span>ホーム</button>
    <button class="nav-btn active"><span class="nav-icon">✏️</span>入力中</button>
    <button class="nav-btn" onclick="saveEvalDraft()"><span class="nav-icon">💾</span>途中保存</button>
    <button class="nav-btn" onclick="showSubmitConfirm()"><span class="nav-icon">✅</span>提出</button>
  </div>
</div>

<!-- PAST EVAL VIEW -->
<div class="view" id="pastEvalView">

function calcRank(role, totalScore) {
  const r = (ALL_ITEMS[role] || ALL_ITEMS.STAFF).rank;
  if (totalScore >= r.S) return 'S　昇格推薦';
  if (totalScore >= r.A) return 'A　昇格候補';

function getPeriodLabel(year, half) {
  return `${year}年${half === 'first' ? '上半期' : '下半期'}`;
}

// 現在の期を推定（参考用）
function getCurrentPeriodSuggestion() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const year = now.getFullYear();
  if (month >= 4 && month <= 9) return {year, half: 'first', label: `${year}年上半期`};
  return {year: month < 4 ? year - 1 : year, half: 'second', label: `${month < 4 ? year-1 : year}年下半期`};
}

// 定量評価項目定義
// ============================================================
const QUANT_ITEMS = [
  {id:'sales',      name:'売上',             format:'currency', unit:'円'},
  {id:'profit',     name:'営業利益',          format:'currency', unit:'円'},
  {id:'gbp',        name:'GBPクチコミ',       format:'decimal',  unit:''},
  {id:'mystery',    name:'ミステリーショッパー', format:'percent',  unit:'%'},
  {id:'gross',      name:'粗利率',            format:'percent',  unit:'%'},
];

// 達成率から評価点を計算
function calcQuantScore(target, actual) {
  if (!target || !actual || target === 0) return null;
  const rate = actual / target;
  if (rate >= 1.10) return 5;
  if (rate >= 1.05) return 4;
  if (rate >= 1.00) return 3;
  if (rate >= 0.95) return 2;
  return 1;
}

// 定量得点計算（役職別配点）
function calcQuantTotal(role, scores) {
  const d = ALL_ITEMS[role] || ALL_ITEMS.STAFF;
  const alloc = d.quantitative;
  const validScores = scores.filter(s => s !== null && s !== undefined);
  if (validScores.length === 0) return 0;
  const avg = validScores.reduce((a,b) => a+b, 0) / validScores.length;
  return Math.round((avg / 5) * alloc * 10) / 10;
}

// 定性得点計算（役職別・カテゴリ別配点）
function calcQualTotal(role, scores) {
  const d = ALL_ITEMS[role] || ALL_ITEMS.STAFF;
  let total = 0;
  d.categories.forEach(cat => {
    const items = cat.items;
    const weightSum = items.reduce((a,b) => a + b.w, 0);
    let weightedSum = 0;
    let hasScore = false;
    items.forEach(item => {
      const s = scores[item.id];
      if (s !== undefined && s !== null) {
        weightedSum += s * item.w;
        hasScore = true;
      }
    });
    if (hasScore && weightSum > 0) {
      const catAvg = weightedSum / weightSum;
      total += (catAvg / 5) * cat.allocation;
    }
  });
  return Math.round(total * 10) / 10;
}

// 数値フォーマット
function formatQuantValue(val, format) {
  if (val === null || val === undefined || val === '') return '-';
  const n = parseFloat(val);
  if (isNaN(n)) return '-';
  if (format === 'currency') return n.toLocaleString('ja-JP') + '円';
  if (format === 'percent') return (n * 100).toFixed(1) + '%';
  if (format === 'decimal') return n.toFixed(1);
  return String(n);
}

function formatRate(target, actual) {
  if (!target || !actual || parseFloat(target) === 0) return '-';
  const rate = parseFloat(actual) / parseFloat(target) * 100;
  return rate.toFixed(1) + '%';
}

async function fetchDB() {
  // まずローカルキャッシュを即座に返す
  let cached = null;
  try {
    const d = localStorage.getItem('ug_db');
    if (d) cached = JSON.parse(d);
  } catch(e) {}

  // バックグラウンドでクラウドと同期
  showLoading(true);
  try {
    const r = await fetch(JSONBIN_URL+'/latest', {headers:{'X-Master-Key':JSONBIN_API_KEY,'X-Bin-Meta':'false'}});
    const d = await r.json();
    showLoading(false);
    // クラウドデータをキャッシュに保存
    try { localStorage.setItem('ug_db', JSON.stringify(d)); } catch(e) {}
    return d;
  } catch(e) {
    showLoading(false);
    showToast('⚠️ オフライン：ローカルデータを使用中');
    return cached || {periods:{},currentPeriod:'',members:[]};
  }
}
async function saveDB(db) {
  // まずローカルに即保存（体感速度向上）
  try { localStorage.setItem('ug_db', JSON.stringify(db)); } catch(e) {}
  // バックグラウンドでクラウドに保存
  showLoading(true);
  try {
    const r = await fetch(JSONBIN_URL, {method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY}, body:JSON.stringify(db)});
    showLoading(false);
    if(!r.ok) throw new Error();
    return true;
  } catch(e) {
    showLoading(false);
    showToast('⚠️ クラウド同期失敗。ローカルに保存済みです');
    return false;
  }
}
function showLoading(v) { document.getElementById('loadingOverlay').classList.toggle('hidden',!v); }

// DB helpers
// ============================================================
function getDB() { return window._db || {periods:{},currentPeriod:'',members:[]}; }
function getPeriodData(periodKey) {
  const db = getDB();
  if (!db.periods[periodKey]) db.periods[periodKey] = {evals:{}};
  return db.periods[periodKey];
}
function getMemberEval(periodKey, memberId) {
  const pd = getPeriodData(periodKey);
  if (!pd.evals[memberId]) pd.evals[memberId] = {
    scores:{},        // 自己評価（定性）
    firstScores:{},   // 1次評価（定性）
    secondScores:{},  // 2次評価（定性）
    q1:'', q2:'',
    feedback:'',
    status:'none',
    submittedAt:null,
    feedbackAt:null,
    firstAt:null,
    secondAt:null,
  };
  // 古いデータとの互換性
  const ev = pd.evals[memberId];
  if (!ev.firstScores) ev.firstScores = {};
  if (!ev.secondScores) ev.secondScores = {};
  return ev;
}

// 店舗の定量評価データを取得
function getStoreQuant(periodKey, store) {
  const pd = getPeriodData(periodKey);
  if (!pd.storeQuant) pd.storeQuant = {};
  if (!pd.storeQuant[store]) pd.storeQuant[store] = {};
  return pd.storeQuant[store];
}

// 定量評価スコアを取得（店舗共通）
function getMemberQuantScores(periodKey, store) {
  const sq = getStoreQuant(periodKey, store);
  return QUANT_ITEMS.map(item => {
    const target = parseFloat(sq[item.id + '_target']) || 0;
    const actual = parseFloat(sq[item.id + '_actual']) || 0;
    return calcQuantScore(target, actual);
  });
}
function getMembers() {
  const db = getDB();
  // membersが未定義・null・空配列の場合はDEFAULT_MEMBERSを返す
  if (!db.members || !Array.isArray(db.members) || db.members.length === 0) {
    return DEFAULT_MEMBERS;
  }
  return db.members;
}

async function renderStaffHome() {
  // まずキャッシュで即描画（ちらつき防止）
  if (!window._db || !window._db.currentPeriod) {
    try {
      const cached = localStorage.getItem('ug_db');
      if (cached) window._db = JSON.parse(cached);
    } catch(e) {}
  }
  if (!window._db) window._db = {periods:{},currentPeriod:'',members:[]};
  if (!window._db.periods) window._db.periods={};

  // キャッシュで先に描画
  _renderStaffHomeContent();

  // バックグラウンドでクラウドと同期して再描画
  const fresh = await fetchDB();
  if (JSON.stringify(fresh) !== JSON.stringify(window._db)) {
    window._db = fresh;
    if (!window._db.periods) window._db.periods={};
    _renderStaffHomeContent();
  }
}

function _renderStaffHomeContent() {
  const db = getDB();
  const user = currentUser;
  const periods = Object.keys(db.periods||{});
  const currentPeriod = db.currentPeriod || '';

  document.getElementById('homeRole').textContent = getRoleLabel(user.role);
  document.getElementById('homeName').textContent = user.name;
  document.getElementById('homeStore').textContent = user.store;
  document.getElementById('homePeriod').textContent = `評価期間: ${currentViewingPeriod||'（期が設定されていません）'}`;
  document.getElementById('headerPeriod').textContent = currentViewingPeriod || '-';

  // 期タブ
  renderPeriodTabs(periods, currentPeriod);

  const isCurrentPeriod = currentViewingPeriod === currentPeriod;
  const ev = currentViewingPeriod ? getMemberEval(currentViewingPeriod, user.id) : null;

  // ステータス
  const hasFeedback = ev && ev.feedback && ev.feedback.trim();
  const statusHtml = ev ? getStatusBadge(ev.status, hasFeedback) : '<span class="status-badge s-none">未入力</span>';
  document.getElementById('homeStatus').innerHTML = statusHtml;

  // フィードバック通知
  const fbNotice = document.getElementById('feedbackNotice');
  if (ev && hasFeedback && ev.status === 'submitted') {
    fbNotice.innerHTML = `<div class="info-banner">💬 フィードバックが入力されています。「確認・PDF出力」から確認できます。</div>`;
  } else { fbNotice.innerHTML = ''; }

  // 期限バナー
  const settings = getSettings();
  const dlBanner = document.getElementById('deadlineBanner');
  if (settings.deadline && isCurrentPeriod) {
    const diff = Math.ceil((new Date(settings.deadline)-new Date())/86400000);
    dlBanner.innerHTML = diff<0 ? `<div class="deadline-banner overdue">⚠️ 提出期限を過ぎています（${settings.deadline}）</div>` : `<div class="deadline-banner">📅 提出期限：${settings.deadline}（あと${diff}日）</div>`;
  } else dlBanner.innerHTML='';

  // 進捗
  const evalCard = document.getElementById('homeEvalCard');
  const pastCard = document.getElementById('homePastCard');

  if (!currentViewingPeriod) {
    evalCard.innerHTML = '<div class="card-title">📋 評価期間</div><p class="text-sm text-muted">管理者が評価期を設定するまでお待ちください。</p>';
    pastCard.style.display = 'none';
    return;
  }

  if (isCurrentPeriod) {
    // 現在期：入力カード
    evalCard.style.display = '';
    evalCard.innerHTML = '<div class="card-title">📋 自己評価の進捗</div><div id="homeProgress"></div><button class="btn btn-primary mt-12" id="btnStartEval" onclick="startEvaluation()">評価を入力する</button>';

    const items = getItemsFlat(user.role);
    const scores = (ev||{}).scores || {};
    const done = items.filter(i=>scores[i.id]!==undefined).length;
    const pct = items.length>0 ? Math.round(done/items.length*100) : 0;

    if (ev && ev.status==='submitted') {
      const hasFB = ev.feedback && ev.feedback.trim();
      evalCard.innerHTML = `<div class="card-title">📋 自己評価の進捗</div>
        <div style="text-align:center;padding:10px 0 8px;">
          <div style="font-size:32px;margin-bottom:6px;">✅</div>
          <div style="font-size:16px;font-weight:800;color:var(--c-dark);margin-bottom:4px;">提出済み</div>
          <div style="font-size:12px;color:var(--c-muted);margin-bottom:12px;">${ev.submittedAt?new Date(ev.submittedAt).toLocaleString('ja-JP'):''}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn btn-dark" onclick="printEvalSheet(currentUser, getMemberEval(currentViewingPeriod, currentUser.id), currentViewingPeriod, false)">🖨️ 面談用PDF出力</button>
          ${hasFB ? `<button class="btn btn-sage" onclick="printEvalSheet(currentUser, getMemberEval(currentViewingPeriod, currentUser.id), currentViewingPeriod, true)">✅ 確認用PDF出力（全項目）</button>` : ''}
          <button class="btn btn-secondary" onclick="startEvaluation()">内容を見直す</button>
        </div>`;
    } else {
      document.getElementById('homeProgress') && (document.getElementById('homeProgress').innerHTML=`
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px;"><span>定性評価</span><span>${done} / ${items.length} 項目</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div class="progress-label">${pct}% 完了</div>`);
      const btn = document.getElementById('btnStartEval');
      if (btn) btn.textContent = done>0 ? '続きから入力する' : '評価を入力する';
    }

    // 過去の期がある場合は過去確認カードも
    if (periods.filter(p=>p!==currentPeriod).length > 0) {
      pastCard.style.display = '';
    } else pastCard.style.display = 'none';

  } else {
    // 過去期：閲覧のみ
    evalCard.style.display = 'none';
    pastCard.style.display = '';
    pastCard.innerHTML = `<div class="card-title">📂 ${currentViewingPeriod}の評価</div>
      <p class="text-sm text-muted" style="margin-bottom:12px;">この期の評価シートを確認・PDF出力できます。</p>
      <button class="btn btn-dark" onclick="showPastEval()">確認・PDF出力する</button>`;
  }
} // end _renderStaffHomeContent

function renderPeriodTabs(periods, currentPeriod) {
  const tabs = document.getElementById('periodTabs');
  if (!tabs) return;
  if (periods.length === 0) { tabs.innerHTML = '<div style="color:rgba(255,255,255,.4);font-size:12px;">期が設定されていません</div>'; return; }
  tabs.innerHTML = periods.slice().reverse().map(p =>
    `<button class="period-tab${p===currentViewingPeriod?' active':''}" onclick="selectPeriod('${p}')">${p}</button>`
  ).join('');
}

function selectPeriod(periodKey) {
  currentViewingPeriod = periodKey;
  renderStaffHome();
}

// ============================================================
// EVAL INPUT
// ============================================================
function startEvaluation() {
  const items = getItemsFlat(currentUser.role);
  const ev = getMemberEval(currentViewingPeriod, currentUser.id);
  const scores = ev.scores || {};

  // 未入力の最初の項目を探す
  let firstMissing = -1;
  for (let i=0; i<items.length; i++) {
    if (scores[items[i].id]===undefined) { firstMissing=i; break; }
  }

  if (firstMissing >= 0) {
    // 未入力項目がある → その項目から再開
    currentStep = firstMissing;
  } else if (!ev.q1) {
    // 全項目入力済みだがQ1未入力
    currentStep = items.length;
  } else if (!ev.q2) {
    // Q1済みだがQ2未入力
    currentStep = items.length + 1;
  } else {
    // 全部入力済み → 確認・提出画面へ
    currentStep = items.length + 2;
  }

  setHeader('自己評価入力');
  showView('evalView'); renderStep();
}

function renderStep() {
  const user = currentUser;
  const items = getItemsFlat(user.role);
  const ev = getMemberEval(currentViewingPeriod, user.id);
  const scores = ev.scores || {};
  const criteria = SCORE_CRITERIA[user.role] || SCORE_CRITERIA.STAFF;
  const totalItems = items.length;
  const totalSteps = totalItems + 3;
  const allDone = items.every(i => scores[i.id] !== undefined);
  const pct = Math.round(currentStep/totalSteps*100);

  let html = `<div style="padding:10px 10px 0;"><div class="step-progress"><div class="step-progress-bar-wrap"><div class="step-progress-bar" style="width:${pct}%"></div></div><div class="step-progress-text">${Math.min(currentStep+1,totalSteps)} / ${totalSteps}</div></div></div>`;

  if (currentStep < totalItems) {
    const item = items[currentStep];
    const sel = scores[item.id];
    const btns = criteria.slice().reverse().map(c => {
      const isSel = sel===c.score;
      return `<button class="score-select-btn${isSel?' selected-'+c.score:''}" onclick="selectScoreAndNext('${item.id}',${c.score},this)">
        <div class="ssb-num ssb-${c.score}">${c.score}</div>
        <div class="ssb-text"><div class="ssb-label">${c.label}</div><div class="ssb-desc">${c.text}</div></div>
      </button>`;
    }).join('');

    html += `<div class="eval-step-card">
      <div class="step-badge">STEP ${currentStep+1} / ${totalItems}</div>
      <div class="step-category">${item.catName}</div>
      <div class="step-item-name">${item.name}</div>
      <div class="step-criteria-box">
        <div class="step-criteria-label">💡 期待される行動（3点基準）</div>
        <div class="step-criteria-text">${item.criteria}</div>
      </div>
      <div class="select-hint">▼ 該当するボタンをタップすると次へ進みます</div>
      <div class="score-btn-row">${btns}</div>
      <button class="step-prev-btn" onclick="prevStep()" ${currentStep===0?'disabled':''}>◀ 前の問題に戻る</button>
    </div>`;

  } else if (currentStep === totalItems) {
    const q1 = ev.q1||'';
    html += `<div class="eval-step-card">
      <div class="step-badge" style="margin-bottom:12px;">振り返り Q1</div>
      <div class="q-label">この半期で、自分が一番貢献した・頑張ったと思う具体的なエピソード（アピールポイント）</div>
      <textarea class="comment-textarea" id="q1Text" placeholder="具体的なエピソードを入力してください...">${q1}</textarea>
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="step-prev-btn" style="flex:1;" onclick="prevStep()">◀ 前へ</button>
        <button class="btn btn-primary" style="flex:2;" onclick="saveQ1Next()">次へ ▶</button>
      </div>
    </div>`;

  } else if (currentStep === totalItems + 1) {
    // Q2入力画面
    const q2 = ev.q2||'';
    html += `<div class="eval-step-card">
      <div class="step-badge" style="margin-bottom:12px;">振り返り Q2</div>
      <div class="q-label">次の半期で、点数を上げるために克服したい課題・チャレンジしたいこと</div>
      <textarea class="comment-textarea" id="q2Text" placeholder="目標や課題を入力してください...">${q2}</textarea>
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="step-prev-btn" style="flex:1;" onclick="prevStep()">◀ 前へ</button>
        <button class="btn btn-sage" style="flex:2;" onclick="saveQ2AndNext()">次へ ▶</button>
      </div>
    </div>`;

  } else {
    // 確認・提出画面（Q2保存後）
    const allScoresDone = items.every(i => scores[i.id] !== undefined);
    const missingCount = items.filter(i => scores[i.id]===undefined).length;

    html += `<div class="complete-banner">
      <div class="complete-banner-icon">${allScoresDone ? '🎉' : '⚠️'}</div>
      <div class="complete-banner-title">${allScoresDone ? 'すべての入力が完了しました！' : `${missingCount}項目が未入力です`}</div>
      <div class="complete-banner-sub">${allScoresDone
        ? '内容を確認して、準備ができたら提出ボタンを押してください。<br>提出後も内容の確認・見直しができます。'
        : '未入力の項目があります。このまま提出するか、戻って入力することができます。'
      }</div>
    </div>
    <div class="submit-action-area">
      ${!allScoresDone ? `<button class="btn btn-secondary" onclick="goToFirstMissing()">⬅️ 未入力の項目へ戻る</button>` : ''}
      <button class="btn btn-submit-final" onclick="submitEval()">✅ 提出する</button>
      <button class="btn btn-review" onclick="currentStep=0;renderStep();">🔍 最初から見直す</button>
    </div>`;
  }

  document.getElementById('evalStepContent').innerHTML = html;
  window.scrollTo(0,0);
}

function goToFirstMissing() {
  const items = getItemsFlat(currentUser.role);
  const scores = getMemberEval(currentViewingPeriod, currentUser.id).scores || {};
  for (let i=0; i<items.length; i++) { if (scores[items[i].id]===undefined) { currentStep=i; renderStep(); return; } }
}

function selectScoreAndNext(itemId, score, btn) {
  const ev = getMemberEval(currentViewingPeriod, currentUser.id);
  if (!ev.scores) ev.scores={};
  ev.scores[itemId]=score;
  if (ev.status==='none') ev.status='draft';
  document.querySelectorAll('.score-select-btn').forEach(b=>{ b.className='score-select-btn'; });
  if (btn) btn.className='score-select-btn selected-'+score;
  setTimeout(()=>{ currentStep++; renderStep(); }, 350);
}

function prevStep() { if(currentStep>0){currentStep--;renderStep();} }

function saveQ1Next() {
  const ev = getMemberEval(currentViewingPeriod, currentUser.id);
  ev.q1 = document.getElementById('q1Text').value;
  currentStep++; renderStep();
}

async function saveQ2() {
  const ev = getMemberEval(currentViewingPeriod, currentUser.id);
  ev.q2 = document.getElementById('q2Text').value;
  const ok = await saveDB(window._db);
  showToast(ok?'💾 保存しました':'⚠️ ローカルに保存しました');
  renderStep();
}

async function saveQ2AndNext() {
  const ev = getMemberEval(currentViewingPeriod, currentUser.id);
  const text = document.getElementById('q2Text')?.value || '';
  ev.q2 = text;
  const ok = await saveDB(window._db);
  showToast(ok?'💾 保存しました':'⚠️ ローカルに保存しました');
  currentStep++;
  renderStep();
}

async function saveEvalDraft() {
  const ev = getMemberEval(currentViewingPeriod, currentUser.id);
  const q1El=document.getElementById('q1Text'), q2El=document.getElementById('q2Text');
  if(q1El) ev.q1=q1El.value;
  if(q2El) ev.q2=q2El.value;
  if(ev.status==='none') ev.status='draft';
  const ok = await saveDB(window._db);
  showToast(ok?'💾 途中保存しました':'⚠️ ローカルに保存しました');
}

function showSubmitConfirm() {
  const items = getItemsFlat(currentUser.role);
  const scores = getMemberEval(currentViewingPeriod, currentUser.id).scores || {};
  const missing = items.filter(i=>scores[i.id]===undefined).length;
  currentStep = items.length+2;
  renderStep();
}

async function submitEval() {
  const ev = getMemberEval(currentViewingPeriod, currentUser.id);
  const q1El=document.getElementById('q1Text'), q2El=document.getElementById('q2Text');
  if(q1El) ev.q1=q1El.value;
  if(q2El) ev.q2=q2El.value;
  const items=getItemsFlat(currentUser.role), scores=ev.scores||{};
  const missing=items.filter(i=>scores[i.id]===undefined).length;
  if(missing>0 && !confirm(`まだ${missing}項目が未入力です。このまま提出しますか？`)) return;
  ev.status='submitted';
  ev.submittedAt=new Date().toISOString();
  const ok=await saveDB(window._db);
  showToast(ok?'✅ 提出しました！':'✅ ローカルに提出保存しました');
  showView('homeView'); renderStaffHome();
}

function renderEvalDetail(member, ev, periodKey, isAdmin) {
  const scores = (ev||{}).scores || {};
  const roleData = ALL_ITEMS[member.role] || ALL_ITEMS.STAFF;
  const colorMap = ['','#c0392b','#e67e22','#7aa5c8','#6d9e7a','#8e44ad'];
  const hasFeedback = ev && ev.feedback && ev.feedback.trim();

  let html = `<div class="home-greeting">
    <div class="hg-role">${getRoleLabel(member.role)}</div>

  </div>`;

      const firstChip = fs!==undefined ? `<div class="score-chip" style="background:${colorMap[fs]}">${fs}</div>` : '<div class="score-chip" style="background:var(--c-gray-light);color:var(--c-muted);">-</div>';
      const secondChip = ss!==undefined ? `<div class="score-chip" style="background:${colorMap[ss]}">${ss}</div>` : '<div class="score-chip" style="background:var(--c-gray-light);color:var(--c-muted);">-</div>';
      rows += `<div class="detail-score-row" style="gap:6px;">
        <span style="flex:1;font-size:12px;">${item.name}</span>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;"><span style="font-size:9px;color:var(--c-muted);">自己</span>${selfChip}</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;"><span style="font-size:9px;color:var(--c-muted);">1次</span>${firstChip}</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;"><span style="font-size:9px;color:var(--c-muted);">確定</span>${secondChip}</div>
      </div>`;
    });
    html += `<div class="card"><div class="card-title" style="font-size:13px;">📋 ${cat.name}（${cat.allocation}点）</div>${rows}</div>`;
  });

  html += `<div class="card">
    <div class="card-title">💬 本人の振り返り・報告</div>
    <div style="font-size:12px;font-weight:700;color:var(--c-muted);margin-bottom:6px;">Q1. アピールポイント</div>
    <div style="background:var(--c-gray-pale);border-radius:8px;padding:12px;font-size:13px;min-height:60px;margin-bottom:14px;white-space:pre-wrap;line-height:1.6;">${(ev&&ev.q1)||'（未入力）'}</div>
    <div style="font-size:12px;font-weight:700;color:var(--c-muted);margin-bottom:6px;">Q2. 課題・チャレンジ</div>
    <div style="background:var(--c-gray-pale);border-radius:8px;padding:12px;font-size:13px;min-height:60px;white-space:pre-wrap;line-height:1.6;">${(ev&&ev.q2)||'（未入力）'}</div>
  </div>`;

  if (hasFeedback) {
    html += `<div class="card">
      <div class="card-title">💜 評価者からのフィードバック</div>
      <div class="feedback-box">
        <div class="feedback-label">フィードバックコメント</div>
        <div class="feedback-text">${ev.feedback}</div>
      </div>
      ${ev.feedbackAt?`<div style="font-size:11px;color:var(--c-muted);text-align:right;">入力日時: ${new Date(ev.feedbackAt).toLocaleString('ja-JP')}</div>`:''}
    </div>`;
  } else if (isAdmin || canGiveFeedback(currentUser)) {
    html += `<div class="card">
      <div class="card-title">💜 フィードバックコメント</div>
      <div style="font-size:13px;color:var(--c-muted);margin-bottom:12px;">まだフィードバックが入力されていません。</div>
      <button class="btn btn-purple" onclick="openFeedbackInput('${member.id}')">✏️ フィードバックを入力する</button>
    </div>`;

  targetEl.innerHTML = html;
}

function openFeedbackInput(memberId) {
  feedbackTargetMember = memberId;
  const member = getMembers().find(m=>m.id===memberId);
  const ev = getMemberEval(currentViewingPeriod, memberId);
  setHeader(`${member.name} へのフィードバック`);

  // 定性評価項目ごとの1次・2次入力フォームを生成
  const roleData2 = ALL_ITEMS[member.role] || ALL_ITEMS.STAFF;
  const selfScores = ev.scores || {};
  const firstScores = ev.firstScores || {};
  const secondScores = ev.secondScores || {};
  const colorMap2 = ['','#c0392b','#e67e22','#7aa5c8','#6d9e7a','#8e44ad'];

  let scoreInputHtml = '';
  roleData2.categories.forEach(cat => {
    scoreInputHtml += `<div style="margin-bottom:14px;">
      <div style="font-size:12px;font-weight:800;background:var(--c-gray-pale);padding:6px 10px;border-radius:6px;margin-bottom:6px;">${cat.name}</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <tr style="background:var(--c-gray-pale);">
          <th style="padding:5px 6px;text-align:left;border:1px solid var(--c-gray-light);width:35%;">評価項目</th>
          <th style="padding:5px;text-align:center;border:1px solid var(--c-gray-light);width:15%;">自己</th>
          <th style="padding:5px;text-align:center;border:1px solid var(--c-gray-light);width:25%;">1次評価</th>
          <th style="padding:5px;text-align:center;border:1px solid var(--c-gray-light);width:25%;">確定(2次)</th>
        </tr>`;
    cat.items.forEach(item => {
      const self = selfScores[item.id];
      const first = firstScores[item.id];
      const second = secondScores[item.id];
      const selfDisp = self !== undefined ? `<div class="score-chip" style="background:${colorMap2[self]};margin:0 auto;">${self}</div>` : '<span style="color:var(--c-muted);">-</span>';
      const scoreOpts = (current, selfVal) => [1,2,3,4,5].map(n => {
        // currentが未設定の場合は自己評価をデフォルトに
        const defaultVal = current !== undefined ? current : selfVal;

      }).join('');
      const selfVal = selfScores[item.id];
      scoreInputHtml += `<tr>
        <td style="padding:5px 6px;border:1px solid var(--c-gray-light);font-size:11px;">${item.name}</td>
        <td style="padding:5px;border:1px solid var(--c-gray-light);text-align:center;">${selfDisp}</td>
        <td style="padding:3px;border:1px solid var(--c-gray-light);text-align:center;">
          <select id="first_${item.id}" style="width:100%;padding:3px;border:1px solid var(--c-gray-light);border-radius:4px;font-size:12px;">
            <option value="">-</option>${scoreOpts(first, selfVal)}
          </select>
        </td>
        <td style="padding:3px;border:1px solid var(--c-gray-light);text-align:center;">
          <select id="second_${item.id}" style="width:100%;padding:3px;border:1px solid var(--c-gray-light);border-radius:4px;font-size:12px;">
            <option value="">-</option>${scoreOpts(second, selfVal)}
          </select>
        </td>
      </tr>`;
    });
    scoreInputHtml += '</table></div>';
  });

  document.getElementById('feedbackContent').innerHTML = `
    <div class="home-greeting" style="margin-bottom:0;">
      <div class="hg-role">${getRoleLabel(member.role)}</div>
      <div class="hg-name">${member.name}</div>
      <div class="hg-store">${member.store} ｜ ${currentViewingPeriod}</div>
    </div>
    <div class="card" style="margin-top:10px;">
      <div class="card-title">📊 1次・確定評価入力</div>
      <p style="font-size:12px;color:var(--c-muted);margin-bottom:12px;line-height:1.6;">面談しながら1次評価を入力。評価会議後に確定（2次）点数を入力してください。</p>
      ${scoreInputHtml}
    </div>
    <div class="card">
      <div class="card-title">💜 フィードバックコメント</div>
      <p style="font-size:12px;color:var(--c-muted);margin-bottom:10px;">面談しながら入力してください。</p>
      <textarea class="feedback-textarea" id="feedbackText" placeholder="フィードバックコメントを入力してください...">${ev.feedback||''}</textarea>
      <div style="margin-top:14px;display:flex;gap:10px;">
        <button class="step-prev-btn" style="flex:1;" onclick="backFromFeedback()">キャンセル</button>
        <button class="btn btn-purple" style="flex:2;" onclick="saveFeedback()">💾 保存する</button>
      </div>
    </div>`;

  showView('feedbackView');
}

async function saveFeedback() {
  const ev = getMemberEval(currentViewingPeriod, feedbackTargetMember);
  const member = getMembers().find(m=>m.id===feedbackTargetMember);
  const roleData = ALL_ITEMS[member.role] || ALL_ITEMS.STAFF;

  // 1次・2次スコアを保存
  if (!ev.firstScores) ev.firstScores = {};
  if (!ev.secondScores) ev.secondScores = {};
  roleData.categories.forEach(cat => {
    cat.items.forEach(item => {
      const fv = document.getElementById('first_' + item.id)?.value;
      const sv = document.getElementById('second_' + item.id)?.value;
      if (fv && fv !== '') ev.firstScores[item.id] = parseInt(fv);
      else delete ev.firstScores[item.id];
      if (sv && sv !== '') ev.secondScores[item.id] = parseInt(sv);
      else delete ev.secondScores[item.id];
    });
  });

  // フィードバックコメント
  const text = document.getElementById('feedbackText')?.value || '';
  ev.feedback = text;
  ev.feedbackAt = new Date().toISOString();

  // 1次・2次どちらか入力があれば面談完了
  const hasFirst = Object.keys(ev.firstScores).length > 0;
  const hasSecond = Object.keys(ev.secondScores).length > 0;
  if (hasFirst || hasSecond || text.trim()) {
    ev.status = 'submitted'; // 提出済みのまま維持
  }

  const ok = await saveDB(window._db);
  showToast(ok?'✅ 保存しました':'⚠️ ローカルに保存しました');
  backFromFeedback();
}

// PDF共通出力関数
// showFull=false → 面談用（1次/確定/FB空白）
// showFull=true  → 確認用（全項目入り）
function printEvalSheet(member, ev, periodKey, showFull) {
  const scores = (ev||{}).scores||{};
  const firstScores = (ev||{}).firstScores||{};
  const secondScores = (ev||{}).secondScores||{};
  const roleData = ALL_ITEMS[member.role]||ALL_ITEMS.STAFF;
  const hasFeedback = ev && ev.feedback && ev.feedback.trim();
  const cm = {1:'#c0392b',2:'#e67e22',3:'#7aa5c8',4:'#6d9e7a',5:'#8e44ad'};

  const sq = getStoreQuant(periodKey, member.store);
  const quantScores = QUANT_ITEMS.map(item => calcQuantScore(
    parseFloat(sq[item.id+'_target'])||0,
    parseFloat(sq[item.id+'_actual'])||0
  ));
  const quantTotal = calcQuantTotal(member.role, quantScores);

  const effectiveScores = {};
  if (showFull) {
    getItemsFlat(member.role).forEach(item => {
      if (secondScores[item.id]!==undefined) effectiveScores[item.id]=secondScores[item.id];
      else if (firstScores[item.id]!==undefined) effectiveScores[item.id]=firstScores[item.id];
      else if (scores[item.id]!==undefined) effectiveScores[item.id]=scores[item.id];
    });
  }
  const qualTotal = showFull ? calcQualTotal(member.role, effectiveScores) : null;
  const totalScore = showFull ? Math.round((quantTotal + qualTotal)*10)/10 : null;
  const rankResult = showFull && totalScore ? calcRank(member.role, totalScore) : null;

  const badgeStyle = showFull
    ? 'background:#d4edda;color:#155724;border:1px solid #28a745;'
    : 'background:#fff3cd;color:#856404;border:1px solid #ffc107;';
  const badgeText = showFull ? '✅ 確認用（全項目）' : '📋 面談用';

  const mkHeader = (pg) => `
    <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #2c2c2c;padding-bottom:4px;margin-bottom:7px;">
      <div>
        <span style="font-size:14px;font-weight:900;color:#2c2c2c;">${getRoleLabel(member.role)} 評価シート</span>
        <span style="margin-left:8px;font-size:10px;color:#555;font-weight:700;">${member.name}　${member.store}　${periodKey}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:9px;color:#aaa;">${pg}</span>
        <span style="display:inline-block;padding:2px 7px;border-radius:3px;font-size:8px;font-weight:700;${badgeStyle}">${badgeText}</span>
      </div>
    </div>`;

  // カテゴリ行のHTML生成（共通関数）
  const mkCatRows = (cat) => {
    const wSum=cat.items.reduce((a,b)=>a+b.w,0);
    let wS=0,cS=0; cat.items.forEach(item=>{if(scores[item.id]!==undefined){wS+=scores[item.id]*item.w;cS++;}});
    const catSelf=cS>0?Math.round((wS/wSum)/5*cat.allocation*10)/10:null;
    let wE=0,cE=0;
    if(showFull) cat.items.forEach(item=>{const v=effectiveScores[item.id];if(v!==undefined){wE+=v*item.w;cE++;}});
    const catEff=showFull&&cE>0?Math.round((wE/wSum)/5*cat.allocation*10)/10:null;
    let rows='';
    cat.items.forEach((item,ii)=>{
      const s=scores[item.id],fs=firstScores[item.id],ss=secondScores[item.id];
      const sd=s!==undefined?`<span style="color:${cm[s]};font-weight:900;font-size:12px;">${s}</span>`:'-';
      const fd=showFull&&fs!==undefined?`<span style="color:${cm[fs]};font-weight:900;font-size:12px;">${fs}</span>`:'';
      const ssd=showFull&&ss!==undefined?`<span style="color:${cm[ss]};font-weight:900;font-size:12px;">${ss}</span>`:'';

      rows+=`<tr>

  // カテゴリを2グループに分ける

  const win = window.open('','_blank');
  let body = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">

  </style></head><body>
  <button class="screen-btn" onclick="window.close()">◀ 閉じる / 戻る</button>

  <!-- ===== PAGE 1: 定量 + 定性（スタンス・接客） ===== -->
  <div class="a4page">
  ${mkHeader('1 / 2')}

  <table style="margin-bottom:5px;">
    <tr>
      <td class="lbl" style="width:10%;">氏名</td>

function downloadCSVForMember(memberId) {
  const member = getMembers().find(m=>m.id===memberId); if(!member) return;
  const ev = getMemberEval(currentViewingPeriod, memberId);
  const scores = ev.scores||{};
  let rows=[['カテゴリ','評価項目','行動基準','自己評価点']];
  getItemsFlat(member.role).forEach(item=>rows.push([item.catName,item.name,item.criteria,scores[item.id]??'']));
  rows.push(['振り返りQ1','','',ev.q1||'']);
  rows.push(['振り返りQ2','','',ev.q2||'']);
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`自己評価_${member.name}_${currentViewingPeriod}.csv`;
  a.click(); URL.revokeObjectURL(url); showToast('📤 CSVをダウンロードしました');
}

async function downloadAllCSV() {
  const members=getMembers();
  let rows=[['氏名','店舗','役職','カテゴリ','評価項目','行動基準','自己評価点']];
  members.forEach(member=>{
    const ev=getMemberEval(currentViewingPeriod, member.id), scores=ev.scores||{};
    getItemsFlat(member.role).forEach(item=>rows.push([member.name,member.store,getRoleLabel(member.role),item.catName,item.name,item.criteria,scores[item.id]??'']));
    rows.push([member.name,member.store,getRoleLabel(member.role),'振り返りQ1','','',ev.q1||'']);
    rows.push([member.name,member.store,getRoleLabel(member.role),'振り返りQ2','','',ev.q2||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`全員自己評価_${currentViewingPeriod}.csv`;
  a.click(); URL.revokeObjectURL(url); showToast('📤 全員分CSVをダウンロードしました');
}

function adminTab(tab, btn) {

function showAdminOverview() {
  const db=getDB(), members=getMembers();
  const period=currentViewingPeriod||db.currentPeriod||'';
  const periods=Object.keys(db.periods||{});

  // 期切替タブ
  const periodTabsHtml = periods.length>0 ? `<div class="period-selector" style="margin:0 0 10px;">
    <div class="period-selector-label">📅 確認する期を選択</div>
    <div class="period-tabs">${periods.slice().reverse().map(p=>`<button class="period-tab${p===currentViewingPeriod?' active':''}" onclick="currentViewingPeriod='${p}';showAdminOverview();">${p}</button>`).join('')}</div>
  </div>` : '<div class="info-banner">まだ評価期が作成されていません。「期管理」タブから作成してください。</div>';

  let submitted=0, meeting=0, notStarted=0;
  members.forEach(m=>{
    const ev=getMemberEval(period,m.id);
    const hasF=ev.feedback&&ev.feedback.trim();
    if(ev.status==='submitted'&&hasF) meeting++;
    else if(ev.status==='submitted') submitted++;
    else notStarted++;
  });

  let storeGroups={};
  members.forEach(m=>{if(!storeGroups[m.store])storeGroups[m.store]=[];storeGroups[m.store].push(m);});
  let membersHtml='';
  Object.keys(storeGroups).forEach(store=>{
    membersHtml+=`<div class="section-heading">${store}</div>`;
    storeGroups[store].forEach(m=>{
      const ev=getMemberEval(period,m.id);
      const items=getItemsFlat(m.role), scores=ev.scores||{};
      const done=items.filter(i=>scores[i.id]!==undefined).length;
      const pct=items.length>0?Math.round(done/items.length*100):0;
      const hasF=ev.feedback&&ev.feedback.trim();
      const badge=getStatusBadge(ev.status,hasF);
      membersHtml+=`<div class="member-row" onclick="showMemberDetail('${m.id}')" style="cursor:pointer;">
        <div class="member-avatar">${m.name[0]}</div>
        <div class="member-info"><div class="member-name">${m.name}</div><div class="member-meta">${getRoleLabel(m.role)} ${badge}</div>
        <div class="progress-bar-wrap" style="margin-top:4px;"><div class="progress-bar" style="width:${pct}%"></div></div></div>
        <div style="font-size:11px;color:var(--c-muted);">▶</div>
      </div>`;
    });
  });

  document.getElementById('adminOverview').innerHTML=`${periodTabsHtml}
    <div class="card"><div class="card-title">📊 ${period||'（期未設定）'}の提出状況</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div class="stat-box" style="background:#d1ecf1;"><div class="stat-num" style="color:#0c5460;">${meeting}</div><div class="stat-label" style="color:#0c5460;">面談完了</div></div>
        <div class="stat-box" style="background:#d4edda;"><div class="stat-num" style="color:#155724;">${submitted}</div><div class="stat-label" style="color:#155724;">提出済み</div></div>
        <div class="stat-box" style="background:var(--c-gray-pale);"><div class="stat-num" style="color:var(--c-muted);">${notStarted}</div><div class="stat-label" style="color:var(--c-muted);">未提出</div></div>
      </div>
      <button class="btn btn-dark" onclick="downloadAllCSV()">📤 全員分CSVダウンロード</button>
    </div>
    <div class="card"><div class="card-title">👥 メンバー別状況</div>${membersHtml}</div>`;
}

function showMemberDetail(memberId) {
  currentDetailMember=memberId;
  const member=getMembers().find(m=>m.id===memberId); if(!member) return;
  const ev=getMemberEval(currentViewingPeriod,memberId);
  renderEvalDetail(member, ev, currentViewingPeriod, true);
  setHeader(member.name+' の詳細');
  showView('detailView');
}

function showAdminFeedback() {
  const members=getMembers();
  const period=currentViewingPeriod;
  let html='';

  if (!period) {
    html='<div class="info-banner" style="margin:12px;">評価期が設定されていません。</div>';
    document.getElementById('adminFeedback').innerHTML=html; return;
  }

  // SM以上のユーザーのみ対象
  const submittedMembers=members.filter(m=>{
    const ev=getMemberEval(period,m.id);
    return ev.status==='submitted';
  });

  if (submittedMembers.length===0) {
    html='<div class="info-banner" style="margin:12px;">提出済みのスタッフがいません。</div>';
    document.getElementById('adminFeedback').innerHTML=html; return;
  }

  let storeGroups={};
  submittedMembers.forEach(m=>{if(!storeGroups[m.store])storeGroups[m.store]=[];storeGroups[m.store].push(m);});

  html=`<div class="card" style="margin-top:10px;"><div class="card-title">💬 フィードバック入力（${period}）</div>
    <p class="text-sm text-muted" style="margin-bottom:12px;">提出済みのスタッフに面談しながらフィードバックを入力します。</p></div>`;

  Object.keys(storeGroups).forEach(store=>{
    html+=`<div class="section-heading">${store}</div>`;
    storeGroups[store].forEach(m=>{
      const ev=getMemberEval(period,m.id);
      const hasF=ev.feedback&&ev.feedback.trim();
      html+=`<div class="card" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div class="member-avatar">${m.name[0]}</div>
          <div><div class="member-name">${m.name}</div><div class="member-meta">${getRoleLabel(m.role)} ｜ ${hasF?'<span style="color:#8e44ad;font-weight:700;">💬 入力済み</span>':'<span style="color:var(--c-muted);">未入力</span>'}</div></div>
        </div>
        ${hasF?`<div class="feedback-box"><div class="feedback-label">入力済みフィードバック</div><div class="feedback-text" style="font-size:12px;">${ev.feedback.substring(0,80)}${ev.feedback.length>80?'...':''}</div></div>`:''}
        <button class="btn ${hasF?'btn-secondary':'btn-purple'} btn-sm" onclick="currentViewingPeriod='${period}';openFeedbackInput('${m.id}')">
          ${hasF?'✏️ 編集する':'✏️ フィードバックを入力する'}
        </button>
      </div>`;
    });
  });

  document.getElementById('adminFeedback').innerHTML=html;
}

function showAdminMembers() {
  const members=getMembers();
  let html=`<div class="card"><div class="card-title">👥 メンバー管理</div>
    <button class="btn btn-primary btn-sm" style="margin-bottom:14px;" onclick="showAddMemberForm()">＋ メンバー追加</button>
    <div id="addMemberFormArea"></div>`;
  members.forEach((m,i)=>{
    html+=`<div class="member-row"><div class="member-avatar">${m.name[0]}</div>
      <div class="member-info"><div class="member-name">${m.name}</div><div class="member-meta">${getRoleLabel(m.role)} ｜ ${m.store}</div></div>
      <div class="member-actions"><button class="btn-icon" onclick="editMember(${i})">✏️</button><button class="btn-icon" onclick="deleteMember(${i})">🗑️</button></div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('adminMembers').innerHTML=html;
}

function showAddMemberForm(ei) {
  const m=ei!==undefined?getMembers()[ei]:null;
  document.getElementById('addMemberFormArea').innerHTML=`<div style="background:var(--c-gray-pale);border:1px solid var(--c-gray-light);border-radius:12px;padding:14px;margin-bottom:14px;">
    <div style="font-size:13px;font-weight:800;margin-bottom:10px;">${m?'編集':'追加'}</div>
    <div class="form-group"><label class="form-label">氏名</label><input class="form-input" id="mf_name" value="${m?.name||''}" placeholder="山田 太郎"></div>
    <div class="form-group"><label class="form-label">役職</label><select class="form-select" id="mf_role">
      <option value="SM" ${m?.role==='SM'?'selected':''}>SM（店長）</option>
      <option value="VSM" ${m?.role==='VSM'?'selected':''}>VSM（副店長）</option>
      <option value="STAFF" ${m?.role==='STAFF'?'selected':''}>一般スタッフ</option>
      <option value="PART" ${m?.role==='PART'?'selected':''}>アルバイト</option>
    </select></div>
    <div class="form-group"><label class="form-label">店舗</label><select class="form-select" id="mf_store">
      <option value="埼玉入間店" ${m?.store==='埼玉入間店'?'selected':''}>埼玉入間店</option>
      <option value="川越インター店" ${m?.store==='川越インター店'?'selected':''}>川越インター店</option>
      <option value="その他">その他</option>
    </select></div>
    <div class="form-group"><label class="form-label">PIN（4桁）</label><input class="form-input" type="tel" maxlength="4" id="mf_pin" value="${m?.pin||''}" placeholder="1234"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-primary btn-sm" onclick="saveMember(${ei})">保存</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('addMemberFormArea').innerHTML=''">キャンセル</button>
    </div>
  </div>`;
}
function editMember(i){showAddMemberForm(i);}
async function saveMember(ei){
  const name=document.getElementById('mf_name').value.trim(),role=document.getElementById('mf_role').value,store=document.getElementById('mf_store').value,pin=document.getElementById('mf_pin').value.trim();
  if(!name||!pin){showToast('氏名とPINを入力してください');return;}
  if(pin.length!==4||!/^\d+$/.test(pin)){showToast('PINは4桁の数字です');return;}
  const members=getMembers();
  if(ei!==undefined) members[ei]={...members[ei],name,role,store,pin};
  else members.push({id:'m'+Date.now(),name,role,store,pin});
  saveMembers(members);
  await saveDB(window._db);
  showToast('✅ 保存しました');showAdminMembers();initStaffSelect();
}
async function deleteMember(i){
  if(!confirm('削除しますか？'))return;
  const m=getMembers();m.splice(i,1);saveMembers(m);
  await saveDB(window._db);
  showToast('🗑️ 削除しました');showAdminMembers();initStaffSelect();
}

// 期管理
function showAdminPeriods() {
  const db=getDB();
  const periods=Object.keys(db.periods||{});
  const suggestion=getCurrentPeriodSuggestion();
  const stores=['埼玉入間店','川越インター店'];

  let html=`<div class="settings-card"><h3>📅 新しい評価期を開始</h3>
    <p class="text-sm text-muted" style="margin-bottom:12px;">新しい期を作成すると、全スタッフの評価入力がリセットされます（過去の期データは保持されます）。</p>
    <div class="form-group"><label class="form-label">期名（例：2026年上半期）</label>
      <input class="form-input" id="newPeriodName" value="${suggestion.label}" placeholder="例：2026年上半期">
    </div>
    <button class="btn btn-primary" onclick="startNewPeriod()">🆕 この期を開始する</button>
  </div>`;

  // 定量評価入力（現在の期）
  if (db.currentPeriod) {
    html += `<div class="settings-card"><h3>📊 定量評価 目標・実績入力（${db.currentPeriod}）</h3>
      <p class="text-sm text-muted" style="margin-bottom:14px;">店舗ごとに目標値と実績値を入力してください。入力後は「保存」を押してください。</p>`;

    stores.forEach(store => {
      const sq = getStoreQuant(db.currentPeriod, store);
      html += `<div style="margin-bottom:18px;">
        <div style="font-size:13px;font-weight:800;color:var(--c-dark);background:var(--c-gray-pale);padding:8px 12px;border-radius:8px;margin-bottom:10px;">🏪 ${store}</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <tr style="background:var(--c-gray-pale);">
            <th style="padding:6px 8px;text-align:left;border:1px solid var(--c-gray-light);">項目</th>
            <th style="padding:6px 8px;text-align:right;border:1px solid var(--c-gray-light);">目標値</th>
            <th style="padding:6px 8px;text-align:right;border:1px solid var(--c-gray-light);">実績値</th>
          </tr>`;
      QUANT_ITEMS.forEach(item => {
        const tid = `q_${store}_${item.id}_target`;
        const aid = `q_${store}_${item.id}_actual`;
        const tval = sq[item.id+'_target'] || '';
        const aval = sq[item.id+'_actual'] || '';
        const placeholder = item.format==='currency'?'例: 85000000':item.format==='percent'?'例: 0.58':'例: 4.3';
        html += `<tr>
          <td style="padding:6px 8px;border:1px solid var(--c-gray-light);font-weight:700;">${item.name}</td>
          <td style="padding:4px;border:1px solid var(--c-gray-light);">
            <input type="number" step="any" id="${tid}" value="${tval}" placeholder="${placeholder}"
              style="width:100%;padding:4px 6px;border:1px solid var(--c-gray-light);border-radius:4px;font-size:12px;text-align:right;">
          </td>
          <td style="padding:4px;border:1px solid var(--c-gray-light);">
            <input type="number" step="any" id="${aid}" value="${aval}" placeholder="${placeholder}"
              style="width:100%;padding:4px 6px;border:1px solid var(--c-gray-light);border-radius:4px;font-size:12px;text-align:right;">
          </td>
        </tr>`;
      });
      html += `</table></div>`;
    });

    html += `<button class="btn btn-primary" onclick="saveQuantData()">💾 定量評価データを保存</button></div>`;
  }

  if (periods.length>0) {
    html+=`<div class="settings-card"><h3>📚 過去の評価期一覧</h3>`;
    periods.slice().reverse().forEach(p=>{
      const isCurrent=p===db.currentPeriod;
      const evCount=Object.keys((db.periods[p]||{}).evals||{}).length;
      html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--c-gray-light);">
        <div><div style="font-size:14px;font-weight:700;">${p} ${isCurrent?'<span style="background:var(--c-salmon);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;">現在の期</span>':''}</div>
        <div style="font-size:11px;color:var(--c-muted);">${evCount}名のデータ</div></div>
        ${!isCurrent?`<button class="btn btn-danger btn-sm" onclick="deletePeriod('${p}')">削除</button>`:''}
      </div>`;
    });
    html+='</div>';
  }

  document.getElementById('adminPeriods').innerHTML=html;
}

async function saveQuantData() {
  const db = getDB();
  const stores = ['埼玉入間店','川越インター店'];
  if (!db.periods[db.currentPeriod].storeQuant) db.periods[db.currentPeriod].storeQuant = {};

  stores.forEach(store => {
    if (!db.periods[db.currentPeriod].storeQuant[store]) db.periods[db.currentPeriod].storeQuant[store] = {};
    QUANT_ITEMS.forEach(item => {
      const tval = document.getElementById(`q_${store}_${item.id}_target`)?.value;
      const aval = document.getElementById(`q_${store}_${item.id}_actual`)?.value;
      if (tval !== undefined) db.periods[db.currentPeriod].storeQuant[store][item.id+'_target'] = tval;
      if (aval !== undefined) db.periods[db.currentPeriod].storeQuant[store][item.id+'_actual'] = aval;
    });
  });

  const ok = await saveDB(db);
  showToast(ok ? '✅ 定量評価データを保存しました' : '⚠️ ローカルに保存しました');
}

async function startNewPeriod() {
  const name=document.getElementById('newPeriodName').value.trim();
  if(!name){showToast('期名を入力してください');return;}
  if(!confirm(`「${name}」を開始しますか？`))return;
  const db=getDB();
  if(!db.periods) db.periods={};
  if(!db.periods[name]) db.periods[name]={evals:{}};
  db.currentPeriod=name;
  currentViewingPeriod=name;
  const ok=await saveDB(db);
  showToast(ok?`✅ 「${name}」を開始しました`:'⚠️ ローカルに保存しました');
  showAdminPeriods();
}

async function deletePeriod(periodKey) {
  if(!confirm(`「${periodKey}」のデータを削除しますか？この操作は取り消せません。`))return;
  const db=getDB();
  delete db.periods[periodKey];
  await saveDB(db);
  showToast('🗑️ 削除しました');showAdminPeriods();
}

function showAdminSettings() {
  const s=getSettings();
  document.getElementById('adminSettings').innerHTML=`
    <div class="settings-card"><h3>📅 提出期限設定</h3>
      <div class="form-group"><label class="form-label">締め切り日</label><input class="form-input" type="date" id="st_deadline" value="${s.deadline||''}"></div>
      <button class="btn btn-primary btn-sm" onclick="saveDeadline()">保存</button>
    </div>
    <div class="settings-card"><h3>🔑 管理者PIN変更</h3>
      <div class="form-group"><label class="form-label">新しいPIN（4桁）</label><input class="form-input" type="tel" maxlength="4" id="st_adminPin" placeholder="0000"></div>
      <button class="btn btn-danger btn-sm" onclick="saveAdminPin()">変更</button>
    </div>
    <div class="settings-card"><h3>☁️ データ再読み込み</h3>
      <button class="btn btn-sage btn-sm" onclick="reloadData()">最新データを取得</button>
    </div>`;
}
function saveDeadline(){const s=getSettings();s.deadline=document.getElementById('st_deadline').value;saveSettings(s);showToast('✅ 保存しました');}
function saveAdminPin(){const pin=document.getElementById('st_adminPin').value.trim();if(pin.length!==4||!/^\d+$/.test(pin)){showToast('PINは4桁の数字です');return;}const s=getSettings();s.adminPin=pin;saveSettings(s);showToast('✅ 変更しました');}
async function reloadData(){window._db=await fetchDB();showToast('✅ 再取得しました');showAdminOverview();}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// INIT
window.onload = async function() {
  initStaffSelect(); // まず DEFAULT_MEMBERS で初期化（画面を素早く表示）
  window._db = await fetchDB();
  // DBが空の場合は初期化
  if (!window._db.periods) window._db.periods={};
  if (!window._db.currentPeriod) window._db.currentPeriod='';
  // membersが空・未定義の場合はDEFAULT_MEMBERSをDBに書き込む
  if (!window._db.members || !Array.isArray(window._db.members) || window._db.members.length === 0) {
    window._db.members = DEFAULT_MEMBERS;
  }
  currentViewingPeriod = window._db.currentPeriod || '';
  // 最新メンバーでセレクトを再描画
  initStaffSelect();
};

</script>
