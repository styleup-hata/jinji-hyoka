<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>動作テスト</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
select, input { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; }
button { padding: 12px 20px; font-size: 16px; margin: 4px; border: 1px solid #ccc; border-radius: 8px; background: #eee; cursor: pointer; }
.pin-btn { width: 30%; height: 52px; font-size: 22px; font-weight: bold; }
#log { background: white; padding: 10px; border-radius: 8px; margin-top: 10px; min-height: 60px; font-size: 13px; }
</style>
</head>
<body>
<h2>動作テスト</h2>
<p id="status">初期化中...</p>

<label>名前選択:</label>
<select id="staffSelect"><option value="">読込中...</option></select>

<label>PINテスト:</label>
<div style="display:flex;gap:8px;margin-bottom:10px;">
  <span id="pd0" style="width:40px;height:40px;border:2px solid #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;background:white;">_</span>
  <span id="pd1" style="width:40px;height:40px;border:2px solid #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;background:white;">_</span>
  <span id="pd2" style="width:40px;height:40px;border:2px solid #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;background:white;">_</span>
  <span id="pd3" style="width:40px;height:40px;border:2px solid #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;background:white;">_</span>
</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;">
  <button class="pin-btn" onclick="pinInput('1')">1</button>
  <button class="pin-btn" onclick="pinInput('2')">2</button>
  <button class="pin-btn" onclick="pinInput('3')">3</button>
  <button class="pin-btn" onclick="pinInput('4')">4</button>
  <button class="pin-btn" onclick="pinInput('5')">5</button>
  <button class="pin-btn" onclick="pinInput('6')">6</button>
  <button class="pin-btn" onclick="pinInput('7')">7</button>
  <button class="pin-btn" onclick="pinInput('8')">8</button>
  <button class="pin-btn" onclick="pinInput('9')">9</button>
  <button class="pin-btn" onclick="pinClear()">C</button>
  <button class="pin-btn" onclick="pinInput('0')">0</button>
  <button class="pin-btn" onclick="pinDelete()">⌫</button>
</div>
<button onclick="doLogin()" style="width:100%;margin-top:10px;background:#e8967a;color:white;border:none;">ログイン</button>

<div id="log">ログ: </div>

<script>
var currentPin = '';
var members = [
  {id:'isaka',     name:'伊坂 邦明',   role:'SM',    store:'埼玉入間店',    pin:'0810'},
  {id:'takano',    name:'高野 彪瑠',   role:'VSM',   store:'埼玉入間店',    pin:'0325'},
  {id:'fukunishi', name:'福西 海人',   role:'STAFF', store:'埼玉入間店',    pin:'0116'},
  {id:'kajisa',    name:'加治佐 魁人', role:'STAFF', store:'埼玉入間店',    pin:'0124'},
  {id:'yaegashi',  name:'八重樫 裕美', role:'PART',  store:'埼玉入間店',    pin:'1019'},
  {id:'hara',      name:'原 昂平',     role:'SM',    store:'川越インター店', pin:'1008'},
  {id:'ito',       name:'伊藤 祐輝',   role:'VSM',   store:'川越インター店', pin:'1015'},
  {id:'yoshizawa', name:'吉澤 陽輝',   role:'STAFF', store:'川越インター店', pin:'0205'},
  {id:'inoue',     name:'井上 京一',   role:'PART',  store:'川越インター店', pin:'0106'},
  {id:'shimizu',   name:'清水 天音',   role:'PART',  store:'川越インター店', pin:'0603'},
  {id:'yamamatsu', name:'山松 泰',     role:'PART',  store:'川越インター店', pin:'0812'},
];

function log(msg) {
  var el = document.getElementById('log');
  el.innerHTML += '<br>' + new Date().toLocaleTimeString() + ' ' + msg;
}

function initSelect() {
  var sel = document.getElementById('staffSelect');
  sel.innerHTML = '<option value="">-- 選択してください --</option>';
  members.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.name + '（' + m.store + '）';
    sel.appendChild(opt);
  });
  log('選択リスト初期化: ' + members.length + '名');
}

function pinInput(d) {
  if (currentPin.length >= 4) return;
  currentPin += d;
  updatePinDisplay();
  log('PIN: ' + currentPin.replace(/./g, '●'));
}

function pinDelete() {
  currentPin = currentPin.slice(0, -1);
  updatePinDisplay();
}

function pinClear() {
  currentPin = '';
  updatePinDisplay();
}

function updatePinDisplay() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('pd' + i);
    dot.textContent = i < currentPin.length ? '●' : '_';
    dot.style.background = i < currentPin.length ? '#e8967a' : 'white';
    dot.style.color = i < currentPin.length ? 'white' : '#333';
  }
}

function doLogin() {
  var sel = document.getElementById('staffSelect');
  var memberId = sel.value;
  if (!memberId) {
    alert('名前を選んでください');
    return;
  }
  var member = null;
  for (var i = 0; i < members.length; i++) {
    if (members[i].id === memberId) { member = members[i]; break; }
  }
  if (!member) { alert('メンバーが見つかりません'); return; }
  if (currentPin === member.pin) {
    alert('ログイン成功！ ' + member.name + 'さん');
    log('ログイン成功: ' + member.name);
  } else {
    alert('PINが違います (入力: ' + currentPin + ')');
    log('ログイン失敗: PIN=' + currentPin);
    currentPin = '';
    updatePinDisplay();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  log('DOMContentLoaded');
  document.getElementById('status').textContent = '✅ 正常に読み込まれました';
  initSelect();
});
</script>
</body>
</html>
